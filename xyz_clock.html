<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYZ Clock</title>
    <style>
        body { margin: 0; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            font-family: monospace;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div id="info"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module">
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        let scene, camera, renderer, controls;
        let marker, trail;
        
        const scale = 15;
        const trailLengthSeconds = 12 * 60 * 60;
        
        const trailPositions = new Float32Array(trailLengthSeconds * 3);
        const trailGeometry = new THREE.BufferGeometry();
        let trailIndex = 0;
        let lastUpdateSecond = -1;
        let drawCount = 0;

        function init() {
            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(20, 20, 20);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Bounding Box
            const boxGeom = new THREE.BoxGeometry(scale * 2, scale * 2, scale * 2);
            const boxEdges = new THREE.EdgesGeometry(boxGeom);
            const boxMaterial = new THREE.LineBasicMaterial({ color: 0x444444 });
            scene.add(new THREE.LineSegments(boxEdges, boxMaterial));

            // Marker
            const markerGeom = new THREE.SphereGeometry(0.3, 16, 16);
            const markerMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            marker = new THREE.Mesh(markerGeom, markerMaterial);
            scene.add(marker);
            
            // Trail
            trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            const trailMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            trail = new THREE.Line(trailGeometry, trailMaterial);
            scene.add(trail);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }
        
        function map_range(value, in_min, in_max, out_min, out_max) {
            return (value - in_min) * (out_max - out_min) / (in_max - in_min) + out_min;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            // Smooth position for the marker
            const smoothX = map_range(h + m / 60, 0, 24, -scale, scale);
            const smoothY = map_range(m + s / 60, 0, 60, -scale, scale);
            const smoothZ = map_range(s + ms / 1000, 0, 60, -scale, scale);
            marker.position.set(smoothX, smoothY, smoothZ);

            // Update trail geometry only once per second
            if (s !== lastUpdateSecond) {
                const x = map_range(h + m / 60, 0, 24, -scale, scale);
                const y = map_range(m + s / 60, 0, 60, -scale, scale);
                const z = map_range(s, 0, 60, -scale, scale); // Use integer second for trail points
                
                trailPositions[trailIndex * 3] = x;
                trailPositions[trailIndex * 3 + 1] = y;
                trailPositions[trailIndex * 3 + 2] = z;

                trailIndex = (trailIndex + 1) % trailLengthSeconds;
                
                if (drawCount < trailLengthSeconds) {
                    drawCount++;
                }

                trail.geometry.setDrawRange(0, drawCount);
                trail.geometry.attributes.position.needsUpdate = true;
                
                lastUpdateSecond = s;
            }

            document.getElementById('info').textContent = now.toLocaleTimeString();

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
