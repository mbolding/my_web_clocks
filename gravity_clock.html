<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Clock</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Rubik', sans-serif;
            color: #fff;
        }

        #time-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15vw;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="time-display">00:00</div>
    <div class="info">Balls = Seconds | Boxes = Minutes (Resets hourly)</div>

    <script>
        // Module aliases
        const Engine = Matter.Engine,
            Render = Matter.Render,
            Runner = Matter.Runner,
            Bodies = Matter.Bodies,
            Composite = Matter.Composite,
            Events = Matter.Events;

        // Create engine
        const engine = Engine.create();
        const world = engine.world;

        // Create renderer
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: 'transparent'
            }
        });

        // Create boundaries
        const wallOptions = { isStatic: true, render: { fillStyle: '#16213e' } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 30, window.innerWidth, 60, wallOptions);
        const leftWall = Bodies.rectangle(-30, window.innerHeight / 2, 60, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + 30, window.innerHeight / 2, 60, window.innerHeight, wallOptions);

        Composite.add(world, [ground, leftWall, rightWall]);

        // Run the renderer
        Render.run(render);

        // Create runner
        const runner = Runner.create();
        Runner.run(runner, engine);

        // State
        let lastSecond = -1;
        let lastMinute = -1;

        // Body storage to manage cleanup
        let secondBodies = [];
        let minuteBodies = [];

        function updateClock() {
            const now = new Date();
            const second = now.getSeconds();
            const minute = now.getMinutes();
            const hour = now.getHours();

            // Update background text
            const timeStr = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
            document.getElementById('time-display').innerText = timeStr;

            // Handle Minutes
            if (minute !== lastMinute) {
                // If new hour, clear everything
                if (minute === 0 && lastMinute !== -1) {
                    clearAll();
                } else if (minute > 0) {
                    // Spawn minute box
                    spawnMinute(minute);
                }
                lastMinute = minute;

                // Also clear seconds on new minute to keep it clean? 
                // Let's just clear seconds every minute to avoid overflow
                // clearSeconds(); // Removed per user request
            }

            // Handle Seconds
            if (second !== lastSecond) {
                spawnSecond(second);
                lastSecond = second;
            }

            requestAnimationFrame(updateClock);
        }

        function spawnSecond(val) {
            // Random x position, top of screen
            const x = Math.random() * (window.innerWidth - 40) + 20;
            const ball = Bodies.circle(x, -20, 10 + Math.random() * 5, {
                restitution: 0.8,
                friction: 0.005,
                render: { fillStyle: '#e94560' }
            });
            secondBodies.push(ball);
            Composite.add(world, ball);
        }

        function spawnMinute(val) {
            const x = Math.random() * (window.innerWidth - 60) + 30;
            const box = Bodies.rectangle(x, -50, 40, 40, {
                restitution: 0.5,
                friction: 0.1,
                render: { fillStyle: '#0f3460' }
            });
            minuteBodies.push(box);
            Composite.add(world, box);
        }

        function clearSeconds() {
            Composite.remove(world, secondBodies);
            secondBodies = [];
        }

        function clearAll() {
            clearSeconds();
            Composite.remove(world, minuteBodies);
            minuteBodies = [];
        }

        // Handle resize
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;

            // Reposition ground and right wall
            Matter.Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 30 });
            Matter.Body.setVertices(ground, Bodies.rectangle(window.innerWidth / 2, window.innerHeight + 30, window.innerWidth, 60).vertices);

            Matter.Body.setPosition(rightWall, { x: window.innerWidth + 30, y: window.innerHeight / 2 });
        });

        // Start
        updateClock();

        // Initial population if loading mid-minute
        const startNow = new Date();
        const startSec = startNow.getSeconds();
        const startMin = startNow.getMinutes();

        // Spawn existing minutes (quickly drop them)
        for (let i = 0; i < startMin; i++) {
            setTimeout(() => spawnMinute(i), i * 50);
        }
        // Spawn existing seconds
        setTimeout(() => {
            for (let i = 0; i < startSec; i++) {
                setTimeout(() => spawnSecond(i), i * 20);
            }
        }, startMin * 50 + 500);

    </script>
</body>

</html>
