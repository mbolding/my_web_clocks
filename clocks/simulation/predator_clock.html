<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predator-Prey Clock</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
        }
        canvas {
            display: block;
        }
        #digitalTime {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="flockingCanvas"></canvas>
    <div id="digitalTime"></div>
    <script>
        const canvas = document.getElementById('flockingCanvas');
        const ctx = canvas.getContext('2d');
        const digitalTimeElement = document.getElementById('digitalTime');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(s) { this.x *= s; this.y *= s; return this; }
            div(s) { this.x /= s; this.y /= s; return this; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() { const mag = this.mag(); if (mag > 0) this.div(mag); return this; }
            limit(max) { if (this.mag() > max) this.normalize().mult(max); return this; }
            static sub(v1, v2) { return new Vector(v1.x - v2.x, v1.y - v2.y); }
        }
        
        class Particle {
            constructor(x, y, color) {
                this.position = new Vector(x, y);
                this.velocity = new Vector(Math.random() * 4 - 2, Math.random() * 4 - 2);
                this.lifespan = 1.0;
                this.color = color;
            }
            update() {
                this.position.add(this.velocity);
                this.lifespan -= 0.02;
            }
            draw() {
                ctx.globalAlpha = this.lifespan;
                ctx.beginPath();
                ctx.arc(this.position.x, this.position.y, 2, 0, 2 * Math.PI);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Predator {
            constructor() {
                this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                this.velocity = new Vector(Math.random() * 2 - 1, Math.random() * 2 - 1);
                this.acceleration = new Vector(0, 0);
                this.target = null;
                this.maxSpeed = 2;
            }

            applyForce(force) { this.acceleration.add(force); }

            findTarget(flock) {
                let closestDist = Infinity;
                for (let boid of flock) {
                    let d = Vector.sub(this.position, boid.position).mag();
                    if (d < closestDist) {
                        closestDist = d;
                        this.target = boid;
                    }
                }
            }

            seek() {
                if (this.target) {
                    let desired = Vector.sub(this.target.position, this.position).normalize().mult(this.maxSpeed);
                    let steer = Vector.sub(desired, this.velocity).limit(0.1);
                    this.applyForce(steer);
                }
            }

            update(maxSpeed, flock, particles, particleCount) {
                this.maxSpeed = maxSpeed;
                if (!this.target) this.findTarget(flock);
                
                this.seek();
                this.velocity.add(this.acceleration);
                this.velocity.limit(this.maxSpeed);
                this.position.add(this.velocity);
                this.acceleration.mult(0);
                this.edges();
                
                if (this.target && Vector.sub(this.position, this.target.position).mag() < 10) {
                    for (let i = 0; i < particleCount; i++) {
                        particles.push(new Particle(this.target.position.x, this.target.position.y, 'white'));
                    }
                    this.target.reset();
                    this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                    this.target = null;
                }
            }
            
            edges() {
                if (this.position.x > canvas.width) this.position.x = 0;
                else if (this.position.x < 0) this.position.x = canvas.width;
                if (this.position.y > canvas.height) this.position.y = 0;
                else if (this.position.y < 0) this.position.y = canvas.height;
            }

            draw(color) {
                ctx.save();
                ctx.translate(this.position.x, this.position.y);
                ctx.rotate(Math.atan2(this.velocity.y, this.velocity.x));
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -7); ctx.lineTo(-7, 7); ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
                ctx.restore();
            }
        }

        class Boid {
            constructor() {
                this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                this.velocity = new Vector(Math.random() * 2 - 1, Math.random() * 2 - 1);
                this.acceleration = new Vector(0, 0);
                this.maxSpeed = 2;
            }
            
            reset() {
                this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                this.velocity = new Vector(Math.random() * 2 - 1, Math.random() * 2 - 1);
            }
            
            applyForce(force) { this.acceleration.add(force); }

            flock(boids, predator, maxSpeed) {
                let flee = this.flee(predator, maxSpeed);
                flee.mult(5);
                this.applyForce(flee);
                
                let separation = new Vector(0, 0), alignment = new Vector(0, 0), cohesion = new Vector(0, 0);
                let perceptionRadius = 50, total = 0;
                for (let other of boids) {
                    if (other !== this) {
                        let d = Vector.sub(this.position, other.position).mag();
                        if (d > 0 && d < perceptionRadius) {
                            alignment.add(other.velocity);
                            cohesion.add(other.position);
                            if (d < 25) {
                                let diff = Vector.sub(this.position, other.position);
                                diff.div(d * d);
                                separation.add(diff);
                            }
                            total++;
                        }
                    }
                }
                if (total > 0) {
                    alignment.div(total).normalize().mult(maxSpeed).sub(this.velocity).limit(0.2);
                    cohesion.div(total).sub(this.position).normalize().mult(maxSpeed).sub(this.velocity).limit(0.1);
                    separation.div(total).normalize().mult(maxSpeed).sub(this.velocity).limit(0.3);
                }
                this.applyForce(separation); this.applyForce(alignment); this.applyForce(cohesion);
            }

            flee(target, maxSpeed) {
                let desired = new Vector(0,0);
                let d = Vector.sub(this.position, target.position).mag();
                if (d < 100) {
                    desired = Vector.sub(this.position, target.position).normalize().mult(maxSpeed);
                    let steer = Vector.sub(desired, this.velocity).limit(0.5);
                    return steer;
                }
                return desired;
            }

            update(maxSpeed) {
                this.maxSpeed = maxSpeed;
                this.velocity.add(this.acceleration);
                this.velocity.limit(this.maxSpeed);
                this.position.add(this.velocity);
                this.acceleration.mult(0);
                this.edges();
            }

            edges() {
                if (this.position.x > canvas.width) this.position.x = 0; else if (this.position.x < 0) this.position.x = canvas.width;
                if (this.position.y > canvas.height) this.position.y = 0; else if (this.position.y < 0) this.position.y = canvas.height;
            }

            draw() {
                ctx.save();
                ctx.translate(this.position.x, this.position.y);
                ctx.rotate(Math.atan2(this.velocity.y, this.velocity.x));
                ctx.beginPath();
                ctx.moveTo(10, 0); ctx.lineTo(-5, -5); ctx.lineTo(-5, 5); ctx.closePath();
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.restore();
            }
        }

        const flock = [];
        for (let i = 0; i < 150; i++) { flock.push(new Boid()); }
        const predator = new Predator();
        const particles = [];

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            
            const predatorMaxSpeed = 1.5 + (h % 12) / 11 * 2;
            const boidMaxSpeed = predatorMaxSpeed - 0.5 > 0 ? predatorMaxSpeed - 0.5 : 0.5;
            const predatorColor = `hsl(${m * 6}, 100%, 50%)`;
            const particleCount = s % 10 + 5;

            predator.update(predatorMaxSpeed, flock, particles, particleCount);
            predator.draw(predatorColor);

            flock.forEach(boid => {
                boid.flock(flock, predator, boidMaxSpeed);
                boid.update(boidMaxSpeed);
                boid.draw();
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].lifespan <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            digitalTimeElement.textContent = now.toLocaleTimeString();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
