<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODE Clock</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        canvas {
            background-color: #fff;
            border: 1px solid #ccc;
        }

        #digitalTime {
            position: absolute;
            bottom: 20px;
            font-family: sans-serif;
            font-size: 1.5rem;
            color: #333;
        }
    </style>
</head>

<body>
    <canvas id="odeCanvas"></canvas>
    <div id="digitalTime"></div>
    <script>
        const canvas = document.getElementById('odeCanvas');
        const ctx = canvas.getContext('2d');
        const digitalTimeElement = document.getElementById('digitalTime');

        const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
        canvas.width = size;
        canvas.height = size;

        const gridSpacing = 30;
        const numCols = Math.floor(size / gridSpacing);
        const numRows = Math.floor(size / gridSpacing);
        const dt = 0.02;
        const maxParticles = 30;

        class Particle {
            constructor(x, y, color, trailLength = 50) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.history = [];
                this.trailLength = trailLength;
            }

            update(curl, sources) {
                // Current pos relative to center
                let px = this.x - size / 2;
                let py = this.y - size / 2;

                let dx = 0;
                let dy = 0;

                // 1. Central Curl (Rotational Field)
                // V = (-y, x) * strength
                dx += -py * curl;
                dy += px * curl;

                // 2. Sources and Sinks
                for (let src of sources) {
                    let rx = this.x - src.x;
                    let ry = this.y - src.y;
                    let d2 = rx * rx + ry * ry + 100; // +100 to avoid singularity
                    let d = Math.sqrt(d2);

                    // V = (rx, ry) / d * strength (falloff 1/r or 1/r^2?)
                    // Let's use 1/r falloff for long-range effect: V ~ 1/d * unit_vec = 1/d * (r/d) = r/d^2
                    let strength = src.strength / d2 * 2000;

                    dx += rx * strength;
                    dy += ry * strength;
                }

                // Apply
                this.x += dx * dt;
                this.y += dy * dt;

                this.history.push([this.x, this.y]);
                if (this.history.length > this.trailLength) {
                    this.history.shift();
                }

                // Bounds: Reset if too far or NaN
                if (this.x < 0 || this.x > size || this.y < 0 || this.y > size || isNaN(this.x)) {
                    this.x = Math.random() * size;
                    this.y = Math.random() * size;
                    this.history = [];
                }
            }

            draw() {
                ctx.beginPath();
                if (this.history.length > 1) {
                    ctx.moveTo(this.history[0][0], this.history[0][1]);
                    for (let i = 1; i < this.history.length; i++) {
                        ctx.lineTo(this.history[i][0], this.history[i][1]);
                    }
                }
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }

        const particles = [];

        function spawnParticle() {
            const x = Math.random() * size;
            const y = Math.random() * size;
            const hue = Math.random() * 360;
            const color = `hsla(${hue}, 80%, 50%, 0.8)`;
            particles.push(new Particle(x, y, color));
        }

        function drawVectorField(curl, sources) {
            ctx.strokeStyle = `rgba(0, 0, 0, 0.1)`;
            ctx.lineWidth = 0.5;
            for (let i = 0; i < numCols; i++) {
                for (let j = 0; j < numRows; j++) {
                    const x = i * gridSpacing + gridSpacing / 2;
                    const y = j * gridSpacing + gridSpacing / 2;

                    // Calculate vector at this point
                    let px = x - size / 2;
                    let py = y - size / 2;

                    let vx = -py * curl;
                    let vy = px * curl;

                    for (let src of sources) {
                        let rx = x - src.x;
                        let ry = y - src.y;
                        let d2 = rx * rx + ry * ry + 100;
                        let strength = src.strength / d2 * 2000;
                        vx += rx * strength;
                        vy += ry * strength;
                    }

                    const angle = Math.atan2(vy, vx);

                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.moveTo(-gridSpacing / 4, 0); // Center the line
                    ctx.lineTo(gridSpacing / 4, 0);
                    // Arrowhead
                    ctx.lineTo(gridSpacing / 4 - 3, -2);
                    ctx.moveTo(gridSpacing / 4, 0);
                    ctx.lineTo(gridSpacing / 4 - 3, 2);
                    ctx.stroke();
                    ctx.restore();
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.fillRect(0, 0, size, size);

            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            // Parameters
            // Curl: Seconds
            const curl = Math.sin((s + ms / 1000) * 2 * Math.PI / 60) * 2.0;

            // Sources/Sinks
            const center = size / 2;
            const radius = size * 0.35;

            // Minute Source (Repeller)
            const minAngle = (m + s / 60) * 2 * Math.PI / 60 - Math.PI / 2;
            const minX = center + Math.cos(minAngle) * radius;
            const minY = center + Math.sin(minAngle) * radius;

            // Hour Sink (Attractor)
            const hrAngle = ((h % 12) + m / 60) * 2 * Math.PI / 12 - Math.PI / 2;
            const hrX = center + Math.cos(hrAngle) * (radius * 0.6); // Slightly closer in
            const hrY = center + Math.sin(hrAngle) * (radius * 0.6);

            const sources = [
                { x: minX, y: minY, strength: 1.5, type: 'source' }, // Minute Source
                { x: hrX, y: hrY, strength: -1.5, type: 'sink' }     // Hour Sink
            ];

            drawVectorField(curl, sources);

            // Draw Source/Sink Indicators
            ctx.beginPath();
            ctx.arc(minX, minY, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'; // Red Source
            ctx.fill();

            ctx.beginPath();
            ctx.arc(hrX, hrY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 255, 0.5)'; // Blue Sink
            ctx.fill();

            if (particles.length < maxParticles && Math.random() < 0.5) {
                spawnParticle();
            }

            particles.forEach(p => {
                p.update(curl, sources);
                p.draw();
            });

            digitalTimeElement.textContent = now.toLocaleTimeString();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>

</html>
