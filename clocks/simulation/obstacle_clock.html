<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obstacle Clock</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            text-align: center;
        }
        canvas {
            display: block;
        }
        #digitalTime {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <canvas id="flockingCanvas"></canvas>
    <div id="digitalTime"></div>
    <script>
        /*
         * A speed-improved simplex noise algorithm for 2D, 3D and 4D in Java.
         * Based on example code by Stefan Gustavson (stegu@itn.liu.se).
         * This code was placed in the public domain by its original author.
         * 2D version ported to Javascript by Arme138.
         */
        function Grad(x, y, z, w) { this.x = x; this.y = y; this.z = z || 0; this.w = w || 0; }
        var SimplexNoise = function() {
            var grad3 = [new Grad(1,1,0),new Grad(-1,1,0),new Grad(1,-1,0),new Grad(-1,-1,0), new Grad(1,0,1),new Grad(-1,0,1),new Grad(1,0,-1),new Grad(-1,0,-1), new Grad(0,1,1),new Grad(0,-1,1),new Grad(0,1,-1),new Grad(0,-1,-1)];
            var p = [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190, 6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168, 68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54, 65,25,63,161, 1,216,80,73,209,76,132,187,208, 89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186, 3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152, 2,44,154,163, 70,221,153,101,155,167, 43,172,9,129,22,39,253, 19,98,108,110,79,113,224,232,178,185, 112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241, 81,51,145,235,249,14,239,107,49,192,214, 31,181,199,106,157,184, 84,204,176,115,121,50,45,127, 4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180];
            var perm = new Array(512), gradP = new Array(512);
            for(var i=0; i<512; i++) { perm[i] = p[i & 255]; gradP[i] = grad3[perm[i] % 12]; }
            var F3 = 1.0/3.0, G3 = 1.0/6.0;
            function fastfloor(x) { return (x>0 ? ~~x : ~~x - 1); }
            function dot3(g, x, y, z) { return g.x*x + g.y*y + g.z*z; }
            this.noise3D = function(xin, yin, zin) {
                var n0, n1, n2, n3;
                var s = (xin+yin+zin)*F3;
                var i = fastfloor(xin+s), j = fastfloor(yin+s), k = fastfloor(zin+s);
                var t = (i+j+k)*G3;
                var X0 = i-t, Y0 = j-t, Z0 = k-t;
                var x0 = xin-X0, y0 = yin-Y0, z0 = zin-Z0;
                var i1, j1, k1, i2, j2, k2;
                if(x0>=y0) { if(y0>=z0) { i1=1; j1=0; k1=0; i2=1; j2=1; k2=0; } else if(x0>=z0) { i1=1; j1=0; k1=0; i2=1; j2=0; k2=1; } else { i1=0; j1=0; k1=1; i2=1; j2=0; k2=1; } }
                else { if(y0<z0) { i1=0; j1=0; k1=1; i2=0; j2=1; k2=1; } else if(x0<z0) { i1=0; j1=1; k1=0; i2=0; j2=1; k2=1; } else { i1=0; j1=1; k1=0; i2=1; j2=1; k2=0; } }
                var x1 = x0 - i1 + G3, y1 = y0 - j1 + G3, z1 = z0 - k1 + G3;
                var x2 = x0 - i2 + 2.0*G3, y2 = y0 - j2 + 2.0*G3, z2 = z0 - k2 + 2.0*G3;
                var x3 = x0 - 1.0 + 3.0*G3, y3 = y0 - 1.0 + 3.0*G3, z3 = z0 - 1.0 + 3.0*G3;
                var ii = i & 255, jj = j & 255, kk = k & 255;
                var t0 = 0.6 - x0*x0 - y0*y0 - z0*z0;
                if(t0<0) n0 = 0.0; else { t0 *= t0; n0 = t0 * t0 * dot3(gradP[ii+perm[jj+perm[kk]]], x0, y0, z0); }
                var t1 = 0.6 - x1*x1 - y1*y1 - z1*z1;
                if(t1<0) n1 = 0.0; else { t1 *= t1; n1 = t1 * t1 * dot3(gradP[ii+i1+perm[jj+j1+perm[kk+k1]]], x1, y1, z1); }
                var t2 = 0.6 - x2*x2 - y2*y2 - z2*z2;
                if(t2<0) n2 = 0.0; else { t2 *= t2; n2 = t2 * t2 * dot3(gradP[ii+i2+perm[jj+j2+perm[kk+k2]]], x2, y2, z2); }
                var t3 = 0.6 - x3*x3 - y3*y3 - z3*z3;
                if(t3<0) n3 = 0.0; else { t3 *= t3; n3 = t3 * t3 * dot3(gradP[ii+1+perm[jj+1+perm[kk+1]]], x3, y3, z3); }
                return 32.0 * (n0 + n1 + n2 + n3);
            };
        };

        const canvas = document.getElementById('flockingCanvas');
        const ctx = canvas.getContext('2d');
        const digitalTimeElement = document.getElementById('digitalTime');
        const noise = new SimplexNoise();

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { this.x += v.x; this.y += v.y; return this; }
            sub(v) { this.x -= v.x; this.y -= v.y; return this; }
            mult(s) { this.x *= s; this.y *= s; return this; }
            div(s) { this.x /= s; this.y /= s; return this; }
            mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
            normalize() { const mag = this.mag(); if (mag > 0) this.div(mag); return this; }
            limit(max) { if (this.mag() > max) this.normalize().mult(max); return this; }
            static sub(v1, v2) { return new Vector(v1.x - v2.x, v1.y - v2.y); }
        }
        
        class Obstacle {
            constructor(radius, noiseOffset) {
                this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                this.radius = radius;
                this.noiseOffset = noiseOffset; // To give each obstacle a different path
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.position.x, this.position.y, this.radius, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 100, 100, 0.7)';
                ctx.fill();
            }
            update(time) {
                const angle = noise.noise3D(this.position.x * 0.001, this.position.y * 0.001, time + this.noiseOffset) * Math.PI * 2;
                const drift = new Vector(Math.cos(angle), Math.sin(angle));
                this.position.add(drift);

                if (this.position.x > canvas.width + this.radius) this.position.x = -this.radius;
                if (this.position.x < -this.radius) this.position.x = canvas.width + this.radius;
                if (this.position.y > canvas.height + this.radius) this.position.y = -this.radius;
                if (this.position.y < -this.radius) this.position.y = canvas.height + this.radius;
            }
        }

        class Boid {
            constructor() {
                this.position = new Vector(Math.random() * canvas.width, Math.random() * canvas.height);
                this.velocity = new Vector(Math.random() * 2 - 1, Math.random() * 2 - 1);
                this.acceleration = new Vector(0, 0);
            }

            applyForce(force) { this.acceleration.add(force); }

            flock(boids, obstacles, cohesionFactor, maxSpeed) {
                let avoidance = this.avoid(obstacles);
                avoidance.mult(5); // High priority
                this.applyForce(avoidance);

                let separation = new Vector(0, 0);
                let alignment = new Vector(0, 0);
                let cohesion = new Vector(0, 0);
                let perceptionRadius = 50;
                let total = 0;

                for (let other of boids) {
                    if (other !== this) {
                        let d = Vector.sub(this.position, other.position).mag();
                        if (d < perceptionRadius) {
                            alignment.add(other.velocity);
                            cohesion.add(other.position);
                            if (d < 25) {
                                let diff = Vector.sub(this.position, other.position);
                                if (d > 0) diff.div(d * d);
                                separation.add(diff);
                            }
                            total++;
                        }
                    }
                }

                if (total > 0) {
                    alignment.div(total).normalize().mult(maxSpeed).sub(this.velocity).limit(0.2);
                    cohesion.div(total).sub(this.position).normalize().mult(maxSpeed).sub(this.velocity).limit(0.1 * cohesionFactor);
                    separation.div(total).normalize().mult(maxSpeed).sub(this.velocity).limit(0.3);
                }
                
                this.applyForce(separation);
                this.applyForce(alignment);
                this.applyForce(cohesion);
            }

            avoid(obstacles) {
                let steer = new Vector(0, 0);
                let count = 0;
                for (let obs of obstacles) {
                    let d = Vector.sub(this.position, obs.position).mag();
                    if (d < obs.radius + 50) {
                        let diff = Vector.sub(this.position, obs.position);
                        diff.normalize().div(d);
                        steer.add(diff);
                        count++;
                    }
                }
                if (count > 0) {
                    steer.div(count).normalize().mult(5).sub(this.velocity).limit(0.5);
                }
                return steer;
            }

            update(maxSpeed) {
                this.velocity.add(this.acceleration);
                this.velocity.limit(maxSpeed);
                this.position.add(this.velocity);
                this.acceleration.mult(0);
                this.edges();
            }

            edges() {
                if (this.position.x > canvas.width) this.position.x = 0;
                else if (this.position.x < 0) this.position.x = canvas.width;
                if (this.position.y > canvas.height) this.position.y = 0;
                else if (this.position.y < 0) this.position.y = canvas.height;
            }

            draw() {
                ctx.save();
                ctx.translate(this.position.x, this.position.y);
                ctx.rotate(Math.atan2(this.velocity.y, this.velocity.x));
                ctx.beginPath();
                ctx.moveTo(10, 0); ctx.lineTo(-5, -5); ctx.lineTo(-5, 5); ctx.closePath();
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.restore();
            }
        }

        const flock = [];
        for (let i = 0; i < 150; i++) {
            flock.push(new Boid());
        }
        const obstacles = [
            new Obstacle(40, 0),
            new Obstacle(60, 1000)
        ];

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = new Date();
            const time = now.getTime() * 0.0001; // Time for noise evolution
            
            const cohesionFactor = (now.getMinutes() % 10) / 10;
            const maxSpeed = 2 + 2 * Math.sin((now.getSeconds() + now.getMilliseconds()/1000) * 2 * Math.PI / 10);

            obstacles.forEach(o => {
                o.update(time);
                o.draw();
            });

            flock.forEach(boid => {
                boid.flock(flock, obstacles, cohesionFactor, maxSpeed);
                boid.update(maxSpeed);
                boid.draw();
            });
            
            digitalTimeElement.textContent = now.toLocaleTimeString();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
