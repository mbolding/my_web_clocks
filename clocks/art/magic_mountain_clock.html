<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Der Zauberberg — The Magic Mountain</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:          #eceae3;
            --page:        #f5f3ed;
            --text:        #1c1a16;
            --muted:       #7a7268;
            --faint:       #b0a898;
            --border:      #d8d4ca;
            --accent:      #3b4a5c;
            --mercury:     #c02828;
            --mercury-bg:  #e8e4de;
            --mountain1:   #2a3040;
            --mountain2:   #1e2535;
            --snow:        rgba(230, 235, 248, 0.85);
        }

        body {
            min-height: 100vh;
            background: linear-gradient(170deg, #dfe0d8 0%, var(--bg) 60%, #d8d5ce 100%);
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--text);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Snow canvas */
        #snowCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }

        /* Alpine mountains */
        .mountains {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: auto;
            pointer-events: none;
            z-index: 2;
        }

        /* Main layout */
        .page {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 5vw, 3rem);
            gap: clamp(1rem, 2.5vw, 1.8rem);
            max-width: 820px;
            width: 100%;
        }

        /* Header */
        header {
            text-align: center;
        }

        .title-de {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 300;
            font-style: italic;
            color: var(--accent);
            letter-spacing: 0.06em;
            line-height: 1;
        }

        .title-en {
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        .author {
            font-size: 0.8rem;
            color: var(--faint);
            margin-top: 0.3rem;
            letter-spacing: 0.15em;
        }

        /* Central row: time + thermometer */
        .central {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(2rem, 6vw, 5rem);
            width: 100%;
        }

        /* Time block */
        .time-block {
            text-align: center;
            flex-shrink: 0;
        }

        .time-display {
            font-family: 'EB Garamond', serif;
            font-size: clamp(4.5rem, 13vw, 9rem);
            font-weight: 500;
            color: var(--text);
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .date-display {
            font-size: clamp(0.85rem, 1.8vw, 1.05rem);
            color: var(--muted);
            letter-spacing: 0.08em;
            margin-top: 0.3rem;
        }

        /* Year at the Berghof */
        .berghof-year {
            margin-top: 1.2rem;
            border: 1px solid var(--border);
            background: rgba(245, 243, 237, 0.75);
            padding: 0.8rem 1.4rem;
            text-align: center;
            backdrop-filter: blur(4px);
        }

        .berghof-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--faint);
            margin-bottom: 0.25rem;
        }

        .berghof-year-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            font-style: italic;
            color: var(--accent);
        }

        .berghof-year-desc {
            font-size: clamp(0.78rem, 1.5vw, 0.9rem);
            color: var(--muted);
            margin-top: 0.2rem;
            font-style: italic;
        }

        /* Thermometer */
        .therm-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .therm-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--faint);
        }

        .therm-temp {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15rem;
            font-style: italic;
            color: var(--mercury);
            letter-spacing: 0.05em;
        }

        .therm-sublabel {
            font-size: 0.65rem;
            color: var(--faint);
            text-align: center;
            font-style: italic;
            max-width: 70px;
            line-height: 1.3;
        }

        /* Quote */
        .quote-block {
            max-width: 560px;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            width: 100%;
        }

        .quote-text {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-style: italic;
            color: var(--muted);
            line-height: 1.75;
            opacity: 1;
            transition: opacity 1.5s ease;
        }

        .quote-attr {
            font-size: 0.7rem;
            color: var(--faint);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            margin-top: 0.6rem;
        }

        /* Daily schedule */
        .schedule-block {
            width: 100%;
            max-width: 560px;
        }

        .schedule-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--faint);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .schedule-track {
            position: relative;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
        }

        .schedule-fill {
            height: 100%;
            background: linear-gradient(to right, var(--accent), #5a7090);
            border-radius: 2px;
            transition: width 1s linear;
        }

        .schedule-dot {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 9px; height: 9px;
            background: var(--mercury);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(192, 40, 40, 0.4);
            transition: left 1s linear;
        }

        .schedule-period {
            text-align: center;
            font-size: clamp(0.78rem, 1.5vw, 0.9rem);
            color: var(--muted);
            font-style: italic;
            margin-top: 0.55rem;
            min-height: 1.3em;
        }
    </style>
</head>
<body>

<canvas id="snowCanvas"></canvas>

<!-- Alpine mountains -->
<svg class="mountains" viewBox="0 0 1440 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <!-- Far range -->
    <polygon
        points="0,220 0,160 90,100 180,140 290,65 400,115 490,75 560,100 630,45 700,80 780,50 860,85 940,38 1020,78 1110,55 1190,88 1270,52 1360,88 1440,65 1440,220"
        fill="#2a3040" opacity="0.65"/>
    <!-- Near range -->
    <polygon
        points="0,220 0,185 70,148 150,170 240,115 320,148 400,120 460,138 520,100 585,122 645,88 715,112 775,80 845,105 920,72 1000,100 1080,75 1160,102 1240,78 1320,105 1390,82 1440,98 1440,220"
        fill="#1e2535" opacity="0.85"/>
</svg>

<div class="page">
    <header>
        <div class="title-de">Der Zauberberg</div>
        <div class="title-en">The Magic Mountain</div>
        <div class="author">Thomas Mann · 1924</div>
    </header>

    <div class="central">
        <div class="time-block">
            <div class="time-display" id="timeDisplay">00:00:00</div>
            <div class="date-display" id="dateDisplay"></div>

            <div class="berghof-year">
                <div class="berghof-label">Year at the Berghof</div>
                <div class="berghof-year-name" id="yearName">Year One</div>
                <div class="berghof-year-desc" id="yearDesc">Hans Castorp arrives from Hamburg</div>
            </div>
        </div>

        <div class="therm-block">
            <div class="therm-label">Temperature</div>
            <svg viewBox="0 0 60 230" width="52" height="200" xmlns="http://www.w3.org/2000/svg">
                <!-- Glass tube -->
                <rect x="24" y="18" width="10" height="160" rx="5"
                      fill="#e8e4de" stroke="#c8c4bc" stroke-width="1"/>
                <!-- Mercury fill (updated by JS) -->
                <rect id="mercuryRect" x="26" y="178" width="6" height="0" rx="3"
                      fill="#c02828"/>
                <!-- Glass highlight -->
                <rect x="26.5" y="20" width="2.5" height="156" rx="1.25"
                      fill="rgba(255,255,255,0.45)"/>
                <!-- Bulb -->
                <circle cx="29" cy="193" r="14" fill="#c02828" stroke="#a02020" stroke-width="1"/>
                <circle cx="25" cy="189" r="4.5" fill="rgba(255,255,255,0.28)"/>
                <!-- Tick marks (left side) -->
                <line x1="24" y1="18"  x2="17" y2="18"  stroke="#a0998e" stroke-width="0.8"/>
                <line x1="24" y1="50"  x2="17" y2="50"  stroke="#a0998e" stroke-width="0.8"/>
                <line x1="24" y1="82"  x2="17" y2="82"  stroke="#a0998e" stroke-width="0.8"/>
                <line x1="24" y1="114" x2="17" y2="114" stroke="#a0998e" stroke-width="0.8"/>
                <line x1="24" y1="146" x2="17" y2="146" stroke="#a0998e" stroke-width="0.8"/>
                <line x1="24" y1="178" x2="17" y2="178" stroke="#a0998e" stroke-width="0.8"/>
                <!-- Temp labels -->
                <text x="15" y="21"  font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">41°</text>
                <text x="15" y="53"  font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">40°</text>
                <text x="15" y="85"  font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">39°</text>
                <text x="15" y="117" font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">38°</text>
                <text x="15" y="149" font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">37°</text>
                <text x="15" y="181" font-size="6.5" fill="#a0998e" text-anchor="end" font-family="Georgia,serif">36°</text>
            </svg>
            <div class="therm-temp" id="tempDisplay">36.0°C</div>
            <div class="therm-sublabel">minute progress</div>
        </div>
    </div>

    <div class="quote-block">
        <div class="quote-text" id="quoteText"></div>
        <div class="quote-attr">— Thomas Mann, Der Zauberberg</div>
    </div>

    <div class="schedule-block">
        <div class="schedule-label">Sanatorium Daily Schedule · Berghof</div>
        <div class="schedule-track">
            <div class="schedule-fill" id="scheduleFill" style="width:0%"></div>
            <div class="schedule-dot"  id="scheduleDot"  style="left:0%"></div>
        </div>
        <div class="schedule-period" id="schedulePeriod"></div>
    </div>
</div>

<script>
// ── Quotes ────────────────────────────────────────────────────────────────────
const QUOTES = [
    "Time has no divisions to mark its passage; there is never a thunderstorm to announce the beginning of a new year.",
    "What is time? A mystery, a figment — and all-powerful. It conditions the exterior world; it is motion married to and mingled with the existence of bodies in space.",
    "He had been here only a few days, yet it seemed to him he had been here for a long time — or rather, that time had ceased to exist.",
    "The greater the monotony, the more time seems to compress: a week here is as a day in the flatlands.",
    "A hermetic, isolated world, cut off from the great world below by the depth of the snow.",
    "One gets used to the idea that down there they are in the midst of events, while up here all is still.",
    "Dullness is the child of Time.",
    "For time is the medium of narration, as it is the medium of life.",
    "He was not bored, he was absorbed — absorbed in that particular way which is the very opposite of boredom.",
    "Seven years. And during all that time he had changed, had grown — yet remained, in some essential way, the same.",
    "The thermometer is the sceptre with which the Hofrat rules his domain.",
    "There is something suspicious about music, gentlemen. I insist that she is, by her nature, equivocal.",
];

// ── Years at the Berghof (24 h → 7 years) ────────────────────────────────────
const YEARS = [
    { name: "Year One",   desc: "Hans Castorp arrives from Hamburg on a brief visit" },
    { name: "Year Two",   desc: "Debates with Settembrini; the rest cure begins" },
    { name: "Year Three", desc: "Carnival — and Clawdia Chauchat" },
    { name: "Year Four",  desc: "Chauchat departs; Naphta arrives with his counter-arguments" },
    { name: "Year Five",  desc: "Mynheer Peeperkorn arrives; Hans drifts further inward" },
    { name: "Year Six",   desc: "The Snow chapter — Hans's vision on the mountain" },
    { name: "Year Seven", desc: "The Great Stupor — until the thunder-clap of war" },
];

// ── Daily schedule ────────────────────────────────────────────────────────────
const SCHEDULE = [
    { start:    0, end:  360, label: "Night: deep sleep in the alpine silence" },
    { start:  360, end:  480, label: "Morning temperature-taking & ablutions" },
    { start:  480, end:  600, label: "First breakfast on the glass veranda" },
    { start:  600, end:  720, label: "Morning rest cure — wrapped in blankets on the balcony" },
    { start:  720, end:  840, label: "Midday meal — five courses, clatter of silver" },
    { start:  840, end:  960, label: "Afternoon rest cure — the long horizontal hours" },
    { start:  960, end: 1020, label: "Afternoon temperature-taking & consultation with the Hofrat" },
    { start: 1020, end: 1140, label: "Afternoon walk or tea on the terrace" },
    { start: 1140, end: 1260, label: "Dinner — the dining hall hums with quiet life" },
    { start: 1260, end: 1440, label: "Evening — books, music, and then retire to one's room" },
];

// ── Snow canvas ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('snowCanvas');
const ctx    = canvas.getContext('2d');
let flakes   = [];

function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
}

function initFlakes() {
    flakes = [];
    for (let i = 0; i < 90; i++) {
        flakes.push({
            x:       Math.random() * canvas.width,
            y:       Math.random() * canvas.height,
            r:       Math.random() * 1.8 + 0.4,
            speed:   Math.random() * 0.45 + 0.1,
            drift:   (Math.random() - 0.5) * 0.25,
            opacity: Math.random() * 0.45 + 0.1,
        });
    }
}

function animateSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    flakes.forEach(f => {
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(225, 230, 245, ${f.opacity})`;
        ctx.fill();
        f.y += f.speed;
        f.x += f.drift;
        if (f.y > canvas.height + 4) { f.y = -4; f.x = Math.random() * canvas.width; }
        if (f.x > canvas.width + 4)  f.x = -4;
        if (f.x < -4)                 f.x = canvas.width + 4;
    });
    requestAnimationFrame(animateSnow);
}

resizeCanvas();
initFlakes();
animateSnow();
window.addEventListener('resize', () => { resizeCanvas(); initFlakes(); });

// ── Quote rotation ────────────────────────────────────────────────────────────
const quoteEl = document.getElementById('quoteText');
let quoteIdx  = 0;
quoteEl.textContent = QUOTES[0];

setInterval(() => {
    quoteEl.style.opacity = '0';
    setTimeout(() => {
        quoteIdx = (quoteIdx + 1) % QUOTES.length;
        quoteEl.textContent = QUOTES[quoteIdx];
        quoteEl.style.opacity = '1';
    }, 1500);
}, 20000);

// ── Thermometer ───────────────────────────────────────────────────────────────
// SVG tube: y=18 (top) to y=178 (bottom), height=160px.
// Mercury fills upward from bottom (y=178).
// Minutes 0–59 map to temperature 36.0°C – 40.5°C.
const mercuryRect = document.getElementById('mercuryRect');
const tempDisplay  = document.getElementById('tempDisplay');

function updateThermometer(minutes) {
    const progress   = minutes / 59;
    const tempC      = 36.0 + progress * 4.5;
    const fillHeight = progress * 160;
    const fillY      = 178 - fillHeight;
    mercuryRect.setAttribute('y',      fillY.toFixed(1));
    mercuryRect.setAttribute('height', fillHeight.toFixed(1));
    tempDisplay.textContent = tempC.toFixed(1) + '°C';
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const pad    = n => String(n).padStart(2, '0');

// ── Main update ───────────────────────────────────────────────────────────────
function update() {
    const now = new Date();
    const h = now.getHours();
    const m = now.getMinutes();
    const s = now.getSeconds();

    // Time & date
    document.getElementById('timeDisplay').textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
    document.getElementById('dateDisplay').textContent =
        `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;

    // Year at the Berghof (24 hours → 7 years)
    const minuteOfDay = h * 60 + m;
    const yearIdx = Math.min(Math.floor((minuteOfDay / 1440) * 7), 6);
    document.getElementById('yearName').textContent = YEARS[yearIdx].name;
    document.getElementById('yearDesc').textContent = YEARS[yearIdx].desc;

    // Thermometer (minutes through the hour)
    updateThermometer(m);

    // Daily schedule bar
    const pct = (minuteOfDay / 1440) * 100;
    document.getElementById('scheduleFill').style.width = pct + '%';
    document.getElementById('scheduleDot').style.left   = pct + '%';

    const seg = SCHEDULE.find(seg => minuteOfDay >= seg.start && minuteOfDay < seg.end)
                || SCHEDULE[SCHEDULE.length - 1];
    document.getElementById('schedulePeriod').textContent = seg.label;
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
