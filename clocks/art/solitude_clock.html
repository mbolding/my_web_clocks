<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Years of Solitude Clock</title>
    <!-- Elegant, warm serif font for magic realism -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        :root {
            --sepia-dark: #2c1e16;
            --sepia-mid: #5c4033;
            --sepia-light: #e6daca;
            --yellow-butterfly: #ffd700;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--sepia-light);
            color: var(--sepia-dark);
            font-family: 'Crimson Text', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            
            /* Old parchment/macondo texture overlay */
            background-image: radial-gradient(circle at center, transparent 20%, rgba(92, 64, 51, 0.4) 150%),
                              repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(92,64,51,0.02) 2px, rgba(92,64,51,0.02) 4px);
        }

        /* ----------------------------------
           THE CLOCK (Macondo Time)
           ---------------------------------- */
        .clock-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 50px;
        }

        /* The Magic Realism Distortion Effect */
        .time-display {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 600;
            letter-spacing: 5px;
            color: var(--sepia-dark);
            /* A subtle text shadow giving physical presence */
            text-shadow: 2px 4px 10px rgba(44, 30, 22, 0.3);
            position: relative;
            transition: all 2s ease;
        }

        .time-blur {
            /* Simulates the breakdown of linear time into circular memory */
            filter: blur(4px) opacity(0.7);
            transform: scale(0.98);
            letter-spacing: 15px;
        }

        .quote-box {
            position: absolute;
            bottom: 60px;
            max-width: 800px;
            text-align: center;
            padding: 0 40px;
            z-index: 20;
            pointer-events: none;
        }

        .quote {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--sepia-mid);
            line-height: 1.6;
        }

        /* ----------------------------------
           THE YELLOW BUTTERFLIES (Canvas)
           ---------------------------------- */
        #butterflyCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="butterflyCanvas"></canvas>

    <div class="clock-container" id="clockContainer">
        <div class="time-display" id="timeDisplay">00:00:00</div>
    </div>

    <div class="quote-box">
        <div class="quote">"Many years later, as he faced the firing squad, Colonel Aureliano Buendía was to remember that distant afternoon when his father took him to discover ice."</div>
    </div>

    <script>
        // --- Clock & Distortion Logic ---
        const timeDisplay = document.getElementById('timeDisplay');
        
        function updateClock() {
            const now = new Date();
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            
            timeDisplay.textContent = `${h}:${m}:${s}`;
            requestAnimationFrame(updateClock);
        }

        updateClock();

        // Magic Realism Circular Time Effect
        // Time occasionally blurs out and distances itself into memory
        function triggerCircularTime() {
            timeDisplay.classList.add('time-blur');
            
            setTimeout(() => {
                timeDisplay.classList.remove('time-blur');
            }, 3000); // 3 seconds of memory fog

            // Randomly trigger between 10 and 20 seconds
            setTimeout(triggerCircularTime, Math.random() * 10000 + 10000);
        }
        
        setTimeout(triggerCircularTime, 5000);

        // --- Butterfly Swarm Canvas ---
        // Mauricio Babilonia's yellow butterflies
        const canvas = document.getElementById('butterflyCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });

        const butterflies = [];
        const numButterflies = 80;

        class Butterfly {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 6 + 4;
                // Base movement direction
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 1.5 + 0.5;
                
                // Wing flapping variables
                this.flapSpeed = Math.random() * 0.4 + 0.2;
                this.flapState = 0;
                
                // Wandering variables
                this.turnSpeed = (Math.random() - 0.5) * 0.1;
            }

            update() {
                // Flap wings using sine wave
                this.flapState += this.flapSpeed;
                
                // Wander slowly
                this.angle += this.turnSpeed;
                // occasionally change turn direction randomly
                if (Math.random() < 0.05) {
                    this.turnSpeed = (Math.random() - 0.5) * 0.1;
                }

                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Screen wrapping
                if (this.x > width + 20) this.x = -20;
                if (this.x < -20) this.x = width + 20;
                if (this.y > height + 20) this.y = -20;
                if (this.y < -20) this.y = height + 20;
            }

            draw() {
                // The sine wave scales the width of the wings simulating flapping in 3D space
                let wingSpan = Math.abs(Math.sin(this.flapState)) * this.size;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                // Rotate butterfly towards its movement direction
                ctx.rotate(this.angle + Math.PI/2);
                
                // Draw Yellow Butterfly
                ctx.fillStyle = 'rgba(255, 215, 0, 0.8)'; // Golden yellow
                ctx.beginPath();
                // Left Wing
                ctx.ellipse(-wingSpan/2, 0, wingSpan/2, this.size, 0, 0, Math.PI * 2);
                // Right Wing
                ctx.ellipse(wingSpan/2, 0, wingSpan/2, this.size, 0, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        for (let i = 0; i < numButterflies; i++) {
            butterflies.push(new Butterfly());
        }

        function animateButterflies() {
            ctx.clearRect(0, 0, width, height);
            
            for (let b of butterflies) {
                b.update();
                b.draw();
            }
            
            requestAnimationFrame(animateButterflies);
        }

        animateButterflies();

    </script>
</body>
</html>
