<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bach Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --mahogany: #3a1c0d;
            --mahogany-light: #5e2c14;
            --gold: #dfb239;
            --gold-glow: rgba(223, 178, 57, 0.4);
            --parchment: #f9eac5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--mahogany);
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%),
                linear-gradient(rgba(0,0,0,0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 2px, transparent 2px);
            background-size: 100% 100%, 100px 100px, 100px 100px;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle wood noise overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            mix-blend-mode: overlay;
        }

        .clock-container {
            position: relative;
            width: clamp(300px, 90vw, 600px);
            height: clamp(300px, 90vw, 600px);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,0,0,0.8);
            background: radial-gradient(circle, var(--mahogany-light) 0%, var(--mahogany) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid var(--gold);
        }

        /* The central cryptogram B-A-C-H */
        .bach-monogram {
            position: absolute;
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 6rem);
            color: var(--parchment);
            text-shadow: 0 0 15px var(--gold-glow);
            z-index: 10;
            text-align: center;
            line-height: 1;
        }

        .bach-monogram span {
            display: block;
            font-size: 0.8rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 5px;
            color: var(--gold);
            margin-top: 10px;
            opacity: 0.8;
            font-style: normal;
        }

        svg {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .staff-line {
            fill: none;
            stroke: var(--gold);
            stroke-width: 0.5px;
            opacity: 0.5;
        }

        .clef {
            fill: var(--gold);
            opacity: 0.6;
        }

        .note-stem {
            stroke: var(--parchment);
            stroke-width: 2px;
        }

        .note-head {
            fill: var(--parchment);
        }

        .note-flag {
            fill: var(--parchment);
        }

        .note-group {
            transition: transform 0.1s linear; /* Smooth visual sweep for seconds */
            filter: drop-shadow(0 0 8px var(--parchment));
        }

        .quote-box {
            margin-top: 40px;
            text-align: center;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--parchment);
            opacity: 0.8;
            max-width: 800px;
            letter-spacing: 1px;
        }

    </style>
</head>
<body>

    <div class="clock-container">
        
        <div class="bach-monogram">
            B A C H
            <span>Johann Sebastian</span>
        </div>

        <svg viewBox="0 0 600 600" id="clockSVG">
            <!-- Staves Generation -->
            <g id="stavesGroup"></g>
            
            <!-- Notes -->
            <!-- SECONDS NOTE (Sixteenth Note) placed on outer staff R=220 -->
            <g class="note-group" id="secondsNote">
                <!-- Rotate center is 300, 300. We place note at top (300, 80) -->
                <!-- Note Head -->
                <ellipse cx="300" cy="80" rx="6" ry="4" transform="rotate(-15, 300, 80)" class="note-head"/>
                <!-- Stem -->
                <line x1="305" y1="80" x2="305" y2="45" class="note-stem"/>
                <!-- Flags (Two for sixteenth) -->
                <path d="M305,45 Q315,55 315,70 Q310,60 305,53" class="note-flag"/>
                <path d="M305,55 Q315,65 315,80 Q310,70 305,63" class="note-flag"/>
            </g>

            <!-- MINUTES NOTE (Quarter Note) placed on middle staff R=160 -->
            <g class="note-group" id="minutesNote">
                <!-- We place note at top (300, 140) -->
                <!-- Note Head -->
                <ellipse cx="300" cy="140" rx="7" ry="5" transform="rotate(-15, 300, 140)" class="note-head"/>
                <!-- Stem -->
                <line x1="306" y1="140" x2="306" y2="105" class="note-stem"/>
            </g>

            <!-- HOURS NOTE (Whole Note) placed on inner staff R=100 -->
            <g class="note-group" id="hoursNote">
                <!-- We place note at top (300, 200) -->
                <!-- Whole note requires an empty center. We use double ellipse inside. -->
                <!-- Note Head (Outer) -->
                <ellipse cx="300" cy="200" rx="9" ry="6" transform="rotate(-15, 300, 200)" fill="var(--parchment)"/>
                <!-- Note Head (Inner Hole) -->
                <ellipse cx="300" cy="200" rx="4" ry="2" transform="rotate(-15, 300, 200)" fill="transparent" class="note-head-inner"/>
                <!-- Hack since inner hole fill needs to be background color. Let's just use a path for the whole note ring. -->
            </g>

        </svg>
    </div>

    <div class="quote-box">
        "It's easy to play any musical instrument: all you have to do is touch the right key at the right time and the instrument will play itself."
    </div>

    <script>
        const svgNS = "http://www.w3.org/2000/svg";
        const stavesGroup = document.getElementById('stavesGroup');

        // Draw the concentric staves
        // Staff details: R=220 (Seconds), R=160 (Minutes), R=100 (Hours)
        const staffRadii = [220, 160, 100];
        
        staffRadii.forEach(r => {
            // A musical staff has 5 lines. Let's use spacing of 4 units.
            // Offsets: -8, -4, 0, 4, 8
            const offsets = [-8, -4, 0, 4, 8];
            offsets.forEach(offset => {
                const circle = document.createElementNS(svgNS, 'circle');
                circle.setAttribute('cx', '300');
                circle.setAttribute('cy', '300');
                circle.setAttribute('r', r + offset);
                circle.setAttribute('class', 'staff-line');
                stavesGroup.appendChild(circle);
            });
        });

        // Special fix for the Whole Note: 
        const hoursGroup = document.getElementById('hoursNote');
        hoursGroup.innerHTML = '';
        const wholeNotePath = document.createElementNS(svgNS, 'path');
        // Simple "O" shape tilted
        wholeNotePath.setAttribute('d', `
            M 300 193 
            C 310 193 313 198 313 200 
            C 313 207 300 207 300 207 
            C 290 207 287 202 287 200 
            C 287 193 300 193 300 193 Z 
            M 301 195 
            C 305 195 307 198 307 200 
            C 307 205 299 205 299 205 
            C 295 205 293 202 293 200 
            C 293 195 301 195 301 195 Z
        `);
        wholeNotePath.setAttribute('fill', 'var(--parchment)');
        wholeNotePath.setAttribute('transform', 'rotate(-15, 300, 200)');
        hoursGroup.appendChild(wholeNotePath);


        // Animation Logic
        const secondsNote = document.getElementById('secondsNote');
        const minutesNote = document.getElementById('minutesNote');
        
        function updateClock() {
            const now = new Date();
            
            const ms = now.getMilliseconds();
            const s = now.getSeconds();
            const m = now.getMinutes();
            const h = now.getHours();

            // Calculate degrees (0 is at 12 o'clock, which maps to top. Our SVG note is initially at top)
            // Sweep seconds smoothly
            const secDeg = ((s + (ms/1000)) / 60) * 360;
            // Sweep minutes smoothly
            const minDeg = ((m + (s/60)) / 60) * 360;
            // Sweep hours smoothly
            const hrDeg = (((h % 12) + (m/60)) / 12) * 360;

            secondsNote.setAttribute('transform', `rotate(${secDeg}, 300, 300)`);
            minutesNote.setAttribute('transform', `rotate(${minDeg}, 300, 300)`);
            hoursGroup.setAttribute('transform', `rotate(${hrDeg}, 300, 300)`);

            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
