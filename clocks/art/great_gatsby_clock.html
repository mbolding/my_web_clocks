<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Great Gatsby Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-night: #080808;
            --gold: #d4af37;
            --gold-muted: #8b7324;
            --green-light: #2ecc71;
            --green-glow: rgba(46, 204, 113, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-night);
            color: var(--gold);
            font-family: 'Poiret One', cursive;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Water reflection effect on background */
        body::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 30vh;
            background: linear-gradient(0deg, rgba(46,204,113,0.05) 0%, transparent 100%);
            animation: tide 6s ease-in-out infinite alternate;
        }

        @keyframes tide {
            0% { transform: translateY(10px); opacity: 0.5; }
            100% { transform: translateY(-10px); opacity: 1; }
        }

        /* Art Deco Border Container */
        .deco-container {
            position: relative;
            width: clamp(320px, 80vw, 600px);
            height: clamp(400px, 80vw, 700px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            border: 2px solid var(--gold);
            padding: 40px;
            background: radial-gradient(circle at center, #111 0%, var(--bg-night) 100%);
            z-index: 10;
        }

        /* Nested borders for the geometric deco look */
        .deco-container::before {
            content: "";
            position: absolute;
            top: 10px; right: 10px; bottom: 10px; left: 10px;
            border: 1px solid var(--gold-muted);
            pointer-events: none;
        }
        
        .deco-container::after {
            content: "";
            position: absolute;
            top: 20px; right: 20px; bottom: 20px; left: 20px;
            border: 1px dashed var(--gold-muted);
            pointer-events: none;
        }

        /* Title */
        .title {
            font-family: 'Limelight', cursive;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-align: center;
            margin-top: 20px;
            color: var(--gold);
            text-shadow: 2px 2px 0px #000, 4px 4px 10px rgba(212, 175, 55, 0.3);
        }

        /* The Green Light */
        .green-light-container {
            position: relative;
            margin: 40px 0;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .green-light {
            width: 25px;
            height: 25px;
            background-color: var(--green-light);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--green-glow), 0 0 40px var(--green-light);
            transition: all 0.5s ease;
        }

        /* Pulse every second */
        .pulse {
            transform: scale(1.3);
            box-shadow: 0 0 30px var(--green-glow), 0 0 60px var(--green-light), 0 0 100px var(--green-light);
        }

        /* Distant Dock Lines */
        .dock-line {
            width: 2px;
            height: 50px;
            background: linear-gradient(var(--green-glow), transparent);
            position: absolute;
            top: 35px;
        }

        /* Clock Time Display */
        .time-display {
            font-size: clamp(4rem, 12vw, 6rem);
            font-weight: bold;
            color: var(--gold);
            text-align: center;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            margin-top: 10px;
            position: relative;
        }

        /* Secs */
        .seconds {
            font-size: 1.5rem;
            opacity: 0.8;
            margin-left: 5px;
        }

        /* Quote Box */
        .quote-box {
            position: absolute;
            bottom: 60px;
            text-align: center;
            font-size: 1.2rem;
            color: var(--gold-muted);
            line-height: 1.6;
            max-width: 80%;
            transition: opacity 1s ease;
        }
        
        .quote-author {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            font-family: 'Limelight', cursive;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Geometric Deco Accents */
        .accent-top {
            position: absolute;
            top: -20px;
            width: 100px;
            height: 40px;
            background: var(--bg-night);
            border: 2px solid var(--gold);
            border-bottom: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 5px;
            z-index: 15;
            left: calc(50% - 50px);
        }
        
        .accent-bottom {
            position: absolute;
            bottom: -20px;
            width: 100px;
            height: 40px;
            background: var(--bg-night);
            border: 2px solid var(--gold);
            border-top: none;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 5px;
            z-index: 15;
            left: calc(50% - 50px);
        }

        .diamond {
            width: 15px;
            height: 15px;
            background: var(--gold);
            transform: rotate(45deg);
        }

    </style>
</head>
<body>

    <div class="deco-container">
        
        <div class="accent-top">
            <div class="diamond"></div>
        </div>

        <div class="title">West Egg</div>

        <div class="green-light-container">
            <div class="green-light" id="greenLight"></div>
            <div class="dock-line"></div>
        </div>

        <div class="time-display">
            <span id="timeText">00:00</span><span class="seconds" id="secText">00</span>
        </div>

        <div class="quote-box" id="quoteText">
            "So we beat on, boats against the current, borne back ceaselessly into the past."
            <span class="quote-author">F. Scott Fitzgerald</span>
        </div>

        <div class="accent-bottom">
            <div class="diamond"></div>
        </div>
    </div>

    <script>
        const quotes = [
            "So we beat on, boats against the current, borne back ceaselessly into the past.",
            "There are only the pursued, the pursuing, the busy and the tired.",
            "I was within and without, simultaneously enchanted and repelled by the inexhaustible variety of life.",
            "Can’t repeat the past? He cried incredulously. Why of course you can!",
            "It takes two to make an accident.",
            "All the bright precious things fade so fast, and they don't come back.",
            "Gatsby believed in the green light, the orgastic future that year by year recedes before us."
        ];

        const timeText = document.getElementById('timeText');
        const secText = document.getElementById('secText');
        const quoteText = document.getElementById('quoteText');
        const greenLight = document.getElementById('greenLight');

        let lastMinute = -1;
        let lastSecond = -1;

        function updateClock() {
            const now = new Date();
            
            let h = now.getHours();
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            
            // 12-hour format
            h = h % 12;
            h = h ? h : 12; // 0 becomes 12
            
            timeText.textContent = `${h}:${m}`;
            secText.textContent = s;

            // Pulse the green light exactly on the second change
            if(lastSecond !== now.getSeconds()) {
                lastSecond = now.getSeconds();
                greenLight.classList.add('pulse');
                setTimeout(() => {
                    greenLight.classList.remove('pulse');
                }, 300); // Pulse duration 300ms
            }

            // Shuffle Quote Every Minute
            if (lastMinute !== now.getMinutes()) {
                lastMinute = now.getMinutes();
                quoteText.style.opacity = 0;
                setTimeout(() => {
                    quoteText.innerHTML = `"${quotes[now.getMinutes() % quotes.length]}" <span class="quote-author">F. Scott Fitzgerald</span>`;
                    quoteText.style.opacity = 0.9;
                }, 1000);
            }

            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
