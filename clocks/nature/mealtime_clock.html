<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mealtime Clock</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fdf6e3;
            --text: #5d4037;
            --accent: #d35400;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Lora', serif;
            transition: background-color 2s ease, color 2s ease;
            text-align: center;
        }

        .container {
            padding: 2rem;
            max-width: 600px;
        }

        .time-display {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.1;
        }

        .sub-text {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-style: italic;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        .quote {
            margin-top: 3rem;
            font-size: 1rem;
            opacity: 0.6;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Clock Face Visualization */
        .clock-face {
            width: clamp(200px, 40vw, 300px);
            height: clamp(200px, 40vw, 300px);
            border: 2px solid var(--text);
            border-radius: 50%;
            position: relative;
            margin: 0 auto 2rem auto;
            background: rgba(255, 255, 255, 0.1);
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            background: var(--text);
            transform-origin: bottom center;
            border-radius: 4px;
            transition: transform 0.5s cubic-bezier(0.4, 2.08, 0.55, 0.44);
        }

        .hour-hand {
            width: 6px;
            height: 30%;
            margin-left: -3px;
        }

        .minute-hand {
            width: 3px;
            height: 45%;
            margin-left: -1.5px;
            opacity: 0.7;
        }

        .meal-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: -3px;
            margin-top: -3px;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="clock-face">
            <div class="hand hour-hand" id="hourHand"></div>
            <div class="hand minute-hand" id="minuteHand"></div>
            <!-- Markers generated by script -->
        </div>

        <div class="time-display" id="currentMeal">Loading...</div>
        <div class="sub-text" id="timeUntil">...</div>

        <div class="quote" id="quote">"It is no bad thing to celebrate a simple life."</div>
    </div>

    <script>
        // Schedule based on Hobbit mealtimes
        const schedule = [
            { name: "Breakfast", start: 7, end: 9, quote: "Time enough for a bite.", color: "#fff3e0", text: "#5d4037" },
            { name: "Second Breakfast", start: 9, end: 11, quote: "We've had one, yes. What about second breakfast?", color: "#ffe0b2", text: "#5d4037" },
            { name: "Elevenses", start: 11, end: 12, quote: "Don't forget the tea.", color: "#ffcc80", text: "#e65100" },
            { name: "Luncheon", start: 12, end: 14, quote: "A proper meal.", color: "#fff9c4", text: "#f57f17" },
            { name: "Afternoon Tea", start: 14, end: 16, quote: "Everything stops for tea.", color: "#e1bee7", text: "#4a148c" },
            { name: "Dinner", start: 16, end: 18, quote: "Feast your eyes.", color: "#ffab91", text: "#bf360c" },
            { name: "Supper", start: 18, end: 20, quote: "Just a light snack before bed.", color: "#cfd8dc", text: "#37474f" },
            { name: "Dreaming", start: 20, end: 7, quote: "Resting for tomorrow's meals.", color: "#263238", text: "#eceff1" }
            // Handle crossover for Dreaming manually logic
        ];

        const currentMealEl = document.getElementById('currentMeal');
        const timeUntilEl = document.getElementById('timeUntil');
        const quoteEl = document.getElementById('quote');
        const hourHand = document.getElementById('hourHand');
        const minuteHand = document.getElementById('minuteHand');

        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const currentDec = hours + minutes / 60;

            // Analog Clock
            const hDeg = (currentDec % 12) * 30;
            const mDeg = minutes * 6;
            hourHand.style.transform = `rotate(${hDeg}deg)`;
            minuteHand.style.transform = `rotate(${mDeg}deg)`;

            // Find Current Era
            let activePhase = null;
            let nextPhase = null;

            // Sort schedule based on start times to be safe
            // note: Dreaming handles the wrap.

            // Check standard slots
            for (let item of schedule) {
                if (item.start < item.end) {
                    // Normal range
                    if (hours >= item.start && hours < item.end) {
                        activePhase = item;
                    }
                } else {
                    // Wrapping range (Dreaming)
                    if (hours >= item.start || hours < item.end) {
                        activePhase = item;
                    }
                }
            }

            // Fallback (e.g. gaps between fixed meals if any? our schedule covers everything)
            if (!activePhase) activePhase = { name: "Snacking", quote: "Always time for a snack.", color: "#f5f5f5", text: "#333" };

            // Determine Next Phase
            // Simple approach: find next start time > current time
            // If wrapping, next is the first one in morning.

            // Update Visuals
            currentMealEl.innerText = activePhase.name;
            quoteEl.innerText = activePhase.quote;

            document.body.style.backgroundColor = activePhase.color;
            document.body.style.color = activePhase.text;
            document.documentElement.style.setProperty('--text', activePhase.text);
            document.documentElement.style.setProperty('--bg', activePhase.color);

            // Time until reasoning
            // Find when current phase ends
            let endTime = activePhase.end;
            let endHour = endTime;
            // logic for calculation
            let targetDate = new Date(now);
            if (activePhase.name === "Dreaming" && hours >= 20) {
                targetDate.setDate(targetDate.getDate() + 1);
            }
            targetDate.setHours(endHour, 0, 0, 0);

            let diff = targetDate - now;
            // If negative (edge case?), add 24 hours
            if (diff < 0) diff += 86400000;

            const mLeft = Math.floor(diff / 60000);
            const hLeft = Math.floor(mLeft / 60);
            const minLeftRemainder = mLeft % 60;

            if (activePhase.name === "Dreaming") {
                timeUntilEl.innerText = `Breakfast in ${hLeft}h ${minLeftRemainder}m`;
            } else {
                timeUntilEl.innerText = `${hLeft}h ${minLeftRemainder}m remaining`;
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>

</html>
