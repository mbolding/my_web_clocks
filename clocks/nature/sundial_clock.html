<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sundial Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            z-index: 10;
            pointer-events: none;
        }

        .title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .time-display {
            font-size: clamp(2rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .date-display {
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            opacity: 0.8;
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            font-size: clamp(0.7rem, 1.5vw, 0.9rem);
            opacity: 0.7;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="info">
        <div class="title">Sundial</div>
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="date-display" id="dateDisplay"></div>
    </div>

    <div class="controls">
        Drag to rotate • Scroll to zoom
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, sundial, gnomon, sun, directionalLight, stars;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let rotationY = 0;
        let rotationX = -0.3;

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x7e8ba3, 10, 50);

            // Camera
            camera = new THREE.PerspectiveCamera(
                45,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(0, 8, 12);
            camera.lookAt(0, 0, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('container').appendChild(renderer.domElement);

            // Ambient light (will be adjusted in updateSunPosition)
            window.ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(window.ambientLight);

            // Directional light (sun)
            directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            directionalLight.shadow.camera.left = -10;
            directionalLight.shadow.camera.right = 10;
            directionalLight.shadow.camera.top = 10;
            directionalLight.shadow.camera.bottom = -10;
            scene.add(directionalLight);

            // Create sun sphere (visual indicator)
            const sunGeometry = new THREE.SphereGeometry(0.5, 16, 16);
            const sunMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                emissive: 0xffff00,
                emissiveIntensity: 1
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);

            // Create sundial base
            const baseGeometry = new THREE.CylinderGeometry(5, 5, 0.5, 32);
            const baseMaterial = new THREE.MeshStandardMaterial({
                color: 0xd4a574,
                roughness: 0.8,
                metalness: 0.2
            });
            sundial = new THREE.Mesh(baseGeometry, baseMaterial);
            sundial.receiveShadow = true;
            sundial.position.y = -0.25;
            scene.add(sundial);

            // Create hour markers
            for (let i = 6; i <= 18; i++) {
                const angle = ((i - 12) / 12) * Math.PI;
                const x = Math.sin(angle) * 4;
                const z = Math.cos(angle) * 4;

                // Marker line
                const markerGeometry = new THREE.BoxGeometry(0.1, 0.6, 0.05);
                const markerMaterial = new THREE.MeshStandardMaterial({
                    color: 0x8b7355,
                    roughness: 0.6
                });
                const marker = new THREE.Mesh(markerGeometry, markerMaterial);
                marker.position.set(x, 0.3, z);
                marker.lookAt(0, 0.3, 0);
                marker.rotateY(Math.PI / 2);
                scene.add(marker);

                // Hour number
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const context = canvas.getContext('2d');
                context.fillStyle = '#8b7355';
                context.font = 'bold 80px Georgia';
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(i.toString(), 64, 64);

                const texture = new THREE.CanvasTexture(canvas);
                const numberMaterial = new THREE.MeshBasicMaterial({
                    map: texture,
                    transparent: true,
                    side: THREE.DoubleSide
                });
                const numberGeometry = new THREE.PlaneGeometry(0.8, 0.8);
                const numberMesh = new THREE.Mesh(numberGeometry, numberMaterial);
                numberMesh.position.set(x * 1.15, 0.01, z * 1.15);
                numberMesh.rotation.x = -Math.PI / 2;
                scene.add(numberMesh);
            }

            // Create gnomon (the pointer that casts shadow)
            const gnomonGroup = new THREE.Group();

            // Triangle gnomon
            const gnomonShape = new THREE.Shape();
            gnomonShape.moveTo(0, 0);
            gnomonShape.lineTo(0, 4);
            gnomonShape.lineTo(0.1, 0);

            const extrudeSettings = { depth: 0.1, bevelEnabled: false };
            const gnomonGeometry = new THREE.ExtrudeGeometry(gnomonShape, extrudeSettings);
            const gnomonMaterial = new THREE.MeshStandardMaterial({
                color: 0x6b5d4f,
                roughness: 0.7,
                metalness: 0.3
            });
            gnomon = new THREE.Mesh(gnomonGeometry, gnomonMaterial);
            gnomon.castShadow = true;
            gnomon.rotation.y = Math.PI / 2;
            gnomon.position.set(0, 0, -0.05);

            gnomonGroup.add(gnomon);
            gnomonGroup.position.y = 0;
            scene.add(gnomonGroup);

            // Ground plane (to catch shadows outside sundial)
            const groundGeometry = new THREE.PlaneGeometry(50, 50);
            const groundMaterial = new THREE.MeshStandardMaterial({
                color: 0x5a7a5a,
                roughness: 0.9
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.receiveShadow = true;
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            scene.add(ground);

            // Create stars for night sky
            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 1000; i++) {
                const x = (Math.random() - 0.5) * 100;
                const y = Math.random() * 50 + 10;
                const z = (Math.random() - 0.5) * 100;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.15,
                transparent: true,
                opacity: 0,
                sizeAttenuation: true
            });
            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Mouse controls
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onWheel);

            // Touch controls
            renderer.domElement.addEventListener('touchstart', onTouchStart);
            renderer.domElement.addEventListener('touchmove', onTouchMove);
            renderer.domElement.addEventListener('touchend', onTouchEnd);

            // Window resize
            window.addEventListener('resize', onWindowResize);
        }

        function updateSunPosition() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            // Calculate hour angle (6 AM = -90°, 12 PM = 0°, 6 PM = 90°)
            const decimalHours = hours + minutes / 60 + seconds / 3600;
            const hourAngle = ((decimalHours - 12) / 12) * Math.PI;

            // Check if it's daytime (6 AM to 6 PM)
            const isDaytime = decimalHours >= 6 && decimalHours <= 18;

            if (isDaytime) {
                // Sun position (elevated arc across the sky)
                const sunDistance = 15;
                const sunHeight = Math.max(3, Math.sin((decimalHours - 6) / 12 * Math.PI) * 12);

                sun.position.x = Math.sin(hourAngle) * sunDistance;
                sun.position.y = sunHeight;
                sun.position.z = Math.cos(hourAngle) * sunDistance;
                sun.visible = true;

                // Update light to match sun position
                directionalLight.position.copy(sun.position);
                directionalLight.intensity = 1.5;
                directionalLight.target.position.set(0, 0, 0);

                // Daytime ambient light
                window.ambientLight.intensity = 0.5;

                // Daytime sky gradient
                renderer.setClearColor(0x7e8ba3, 1);
                scene.fog.color.setHex(0x7e8ba3);
                document.body.style.background = 'linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e8ba3 100%)';

                // Hide stars during day (smooth transition)
                stars.material.opacity = Math.max(0, stars.material.opacity - 0.02);
            } else {
                // Nighttime - hide sun and dim everything
                sun.visible = false;

                // Very dim moonlight from above
                directionalLight.position.set(0, 10, 0);
                directionalLight.intensity = 0.1;

                // Much dimmer ambient light at night
                window.ambientLight.intensity = 0.08;

                // Dark night sky
                renderer.setClearColor(0x0a0a1a, 1);
                scene.fog.color.setHex(0x0a0a1a);
                document.body.style.background = 'linear-gradient(135deg, #000000 0%, #0a0a1a 50%, #1a1a2e 100%)';

                // Show stars at night (smooth transition)
                stars.material.opacity = Math.min(0.8, stars.material.opacity + 0.02);
            }

            // Update time display
            const timeStr = [hours, minutes, seconds]
                .map(n => n.toString().padStart(2, '0'))
                .join(':');
            document.getElementById('timeDisplay').textContent = timeStr;

            // Update date
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('dateDisplay').textContent =
                `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
        }

        function animate() {
            requestAnimationFrame(animate);

            updateSunPosition();

            // Apply rotation
            scene.rotation.y = rotationY;
            scene.rotation.x = rotationX;

            renderer.render(scene, camera);
        }

        function onMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseMove(e) {
            if (!isDragging) return;

            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;

            rotationY += deltaX * 0.005;
            rotationX += deltaY * 0.005;
            rotationX = Math.max(-Math.PI / 2, Math.min(0, rotationX));

            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onWheel(e) {
            e.preventDefault();
            camera.position.z += e.deltaY * 0.01;
            camera.position.z = Math.max(5, Math.min(20, camera.position.z));
        }

        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = {
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        }

        function onTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;

            const deltaX = e.touches[0].clientX - previousMousePosition.x;
            const deltaY = e.touches[0].clientY - previousMousePosition.y;

            rotationY += deltaX * 0.005;
            rotationX += deltaY * 0.005;
            rotationX = Math.max(-Math.PI / 2, Math.min(0, rotationX));

            previousMousePosition = {
                x: e.touches[0].clientX,
                y: e.touches[0].clientY
            };
        }

        function onTouchEnd() {
            isDragging = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        animate();
    </script>
</body>
</html>
