<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slaughterhouse-Five Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Jost:wght@300;600&family=Monoton&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Base */
            --bg: #111;
            --text: #fff;
            
            /* State 1: Ilium 1968 (Suburban/Optometry) */
            --bg-ilium: #f5fafd;
            --text-ilium: #2c3e50;
            --accent-ilium: #3498db;
            
            /* State 2: Dresden 1945 (War/Fire) */
            --bg-dresden: #1a0a00;
            --text-dresden: #e6b800;
            --accent-dresden: #ff3300;

            /* State 3: Tralfamadore 1976 (Alien Zoo) */
            --bg-tralf: #2b0033;
            --text-tralf: #00ffcc;
            --accent-tralf: #ff00ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.1s, color 0.1s; /* Very snappy transitions for 'unstuck' effect */
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* -------------------------------------
           STATE THEMES 
           ------------------------------------- */

        /* 1: ILIUM 1968 */
        body.mode-ilium {
            background-color: var(--bg-ilium);
            color: var(--text-ilium);
            background-image: linear-gradient(0deg, transparent 24%, rgba(44, 62, 80, 0.05) 25%, rgba(44, 62, 80, 0.05) 26%, transparent 27%, transparent 74%, rgba(44, 62, 80, 0.05) 75%, rgba(44, 62, 80, 0.05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(44, 62, 80, 0.05) 25%, rgba(44, 62, 80, 0.05) 26%, transparent 27%, transparent 74%, rgba(44, 62, 80, 0.05) 75%, rgba(44, 62, 80, 0.05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
        }
        .mode-ilium .clock-display {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            border: 2px solid var(--accent-ilium);
            border-radius: 10px;
            padding: 30px;
            background: #fff;
            box-shadow: 10px 10px 0px rgba(52, 152, 219, 0.2);
        }
        .mode-ilium .year-badge {
            background: var(--accent-ilium);
            color: #fff;
            font-family: 'Jost', sans-serif;
        }

        /* 2: DRESDEN 1945 */
        body.mode-dresden {
            background-color: var(--bg-dresden);
            color: var(--text-dresden);
            background-image: radial-gradient(circle at center, transparent 0%, #000 100%);
        }
        .mode-dresden .clock-display {
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            border: none;
            text-shadow: 2px 2px 0px var(--accent-dresden), -2px -2px 0px #000;
            animation: fireFlicker 0.1s infinite;
        }
        .mode-dresden .year-badge {
            background: transparent;
            color: var(--accent-dresden);
            border-bottom: 2px solid var(--accent-dresden);
            font-family: 'Courier Prime', monospace;
        }
        @keyframes fireFlicker {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            50% { transform: translate(-2px, 1px) scale(1.01); opacity: 0.9; }
            100% { transform: translate(1px, -2px) scale(0.99); opacity: 1; }
        }

        /* 3: TRALFAMADORE 1976 */
        body.mode-tralf {
            background-color: var(--bg-tralf);
            color: var(--text-tralf);
            background-image: repeating-radial-gradient(circle at 50% 50%, transparent 0, transparent 20px, rgba(255,0,255,0.1) 21px, rgba(255,0,255,0.1) 22px);
        }
        .mode-tralf .clock-display {
            font-family: 'Monoton', cursive;
            font-size: clamp(3rem, 10vw, 5rem); /* Monoton is thick, needs scale down */
            border: none;
            padding: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 40px var(--accent-tralf), inset 0 0 20px var(--text-tralf);
            animation: floatZoo 4s ease-in-out infinite alternate;
        }
        .mode-tralf .year-badge {
            background: var(--text-tralf);
            color: var(--bg-tralf);
            font-family: 'Courier Prime', monospace;
            border-radius: 20px;
        }
        @keyframes floatZoo {
            0% { transform: translateY(10px); }
            100% { transform: translateY(-10px); }
        }

        /* -------------------------------------
           SHARED STRUCTURE
           ------------------------------------- */

        .title-bar {
            position: absolute;
            top: 30px;
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .year-badge {
            font-size: 1.5rem;
            padding: 5px 20px;
            margin-bottom: 20px;
            font-weight: bold;
            transition: all 0s; /* Instant snap */
            letter-spacing: 4px;
        }

        .clock-display {
            font-size: clamp(4rem, 15vw, 8rem);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            line-height: 1;
        }

        .quote-box {
            position: absolute;
            bottom: 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: lowercase;
            letter-spacing: 5px;
        }

        /* Glitch flash screen effect */
        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
        }
        
        .is-flashing {
            animation: shutter 0.15s ease-out;
        }

        @keyframes shutter {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

    </style>
</head>
<body class="mode-ilium" id="bodyEl">

    <div class="flash-overlay" id="flashOverlay"></div>

    <div class="title-bar">
        Billy Pilgrim has come unstuck in time.
    </div>

    <div class="clock-container">
        <div class="year-badge" id="yearBadge">1968</div>
        <div class="clock-display" id="timeDisplay">00:00:00</div>
    </div>

    <div class="quote-box">
        so it goes.
    </div>

    <script>
        const bodyEl = document.getElementById('bodyEl');
        const yearBadge = document.getElementById('yearBadge');
        const timeDisplay = document.getElementById('timeDisplay');
        const flashOverlay = document.getElementById('flashOverlay');

        // Three moments in Billy Pilgrim's life
        const timeModes = [
            { class: 'mode-ilium', year: '1968', desc: 'Optometry Practice' },
            { class: 'mode-dresden', year: '1945', desc: 'Dresden' },
            { class: 'mode-tralf', year: '1976', desc: 'Tralfamadore' }
        ];

        let currentModeIndex = 0;

        function jumpTimeDirectionless() {
            // Pick a random mode that is NOT the current mode
            let nextModeIndex;
            do {
                nextModeIndex = Math.floor(Math.random() * timeModes.length);
            } while (nextModeIndex === currentModeIndex);

            currentModeIndex = nextModeIndex;
            const mode = timeModes[currentModeIndex];

            // Flash effect
            flashOverlay.classList.remove('is-flashing');
            void flashOverlay.offsetWidth; // Trigger reflow
            flashOverlay.classList.add('is-flashing');

            // Apply new mode
            bodyEl.className = mode.class;
            yearBadge.textContent = mode.year;

            // Schedule next jump (unpredictable, between 4 and 12 seconds)
            const nextJumpMs = Math.floor(Math.random() * 8000) + 4000;
            setTimeout(jumpTimeDirectionless, nextJumpMs);
        }

        // Start the unstuck jumping loops
        setTimeout(jumpTimeDirectionless, 5000);

        // Core Clock Loop - ALWAYS ACCURATE
        function updateClock() {
            const now = new Date();
            
            let h = now.getHours().toString().padStart(2, '0');
            let m = now.getMinutes().toString().padStart(2, '0');
            let s = now.getSeconds().toString().padStart(2, '0');
            
            timeDisplay.textContent = `${h}:${m}:${s}`;

            requestAnimationFrame(updateClock);
        }

        updateClock();
    </script>
</body>
</html>
