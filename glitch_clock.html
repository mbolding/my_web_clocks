<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --primary: #0ff;
            --secondary: #f0f;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .clock-container {
            position: relative;
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: bold;
            letter-spacing: 0.05em;
            line-height: 1;
        }

        .glitch {
            position: relative;
            color: var(--text-color);
        }

        /* Duplicate layers for glitch effect */
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }

        /* Cyan layer */
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 var(--secondary);
            animation: glitch-anim-1 2.5s infinite linear alternate-reverse;
        }

        /* Magenta layer */
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 var(--primary);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .date {
            margin-top: 1rem;
            font-size: clamp(1rem, 3vw, 2rem);
            text-align: center;
            opacity: 0.8;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        @keyframes glitch-anim-1 {
            0% {
                clip-path: inset(20% 0 80% 0);
            }

            20% {
                clip-path: inset(60% 0 1% 0);
            }

            40% {
                clip-path: inset(40% 0 50% 0);
            }

            60% {
                clip-path: inset(80% 0 5% 0);
            }

            80% {
                clip-path: inset(10% 0 70% 0);
            }

            100% {
                clip-path: inset(30% 0 20% 0);
            }
        }

        @keyframes glitch-anim-2 {
            0% {
                clip-path: inset(10% 0 60% 0);
            }

            20% {
                clip-path: inset(30% 0 10% 0);
            }

            40% {
                clip-path: inset(70% 0 20% 0);
            }

            60% {
                clip-path: inset(10% 0 80% 0);
            }

            80% {
                clip-path: inset(50% 0 30% 0);
            }

            100% {
                clip-path: inset(0% 0 0% 0);
            }
        }

        /* Scanline effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom,
                    rgba(255, 255, 255, 0),
                    rgba(255, 255, 255, 0) 50%,
                    rgba(0, 0, 0, 0.2) 50%,
                    rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0) 60%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
            z-index: 11;
        }

        /* Occasional intense glitch class */
        .intense-glitch {
            animation: shake 0.2s cubic-bezier(.36, .07, .19, .97) both;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
</head>

<body>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="container">
        <div class="clock-container">
            <div class="glitch" id="clock" data-text="00:00:00">00:00:00</div>
        </div>
        <div class="date" id="date">LOADING...</div>
    </div>

    <script>
        const clockEl = document.getElementById('clock');
        const dateEl = document.getElementById('date');

        function updateTime() {
            const now = new Date();

            // Format time
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hours}:${minutes}:${seconds}`;

            // Update clock
            if (clockEl.innerText !== timeStr) {
                clockEl.innerText = timeStr;
                clockEl.setAttribute('data-text', timeStr);
            }

            // Format date
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);
            if (dateEl.innerText !== dateStr) {
                dateEl.innerText = dateStr;
            }

            // Random intense glitch
            if (Math.random() < 0.02) { // 2% chance per frame
                clockEl.classList.add('intense-glitch');
                setTimeout(() => {
                    clockEl.classList.remove('intense-glitch');
                }, 200);
            }

            requestAnimationFrame(updateTime);
        }

        updateTime();
    </script>
</body>

</html>
