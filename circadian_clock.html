<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circadian Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            transition: background 1s ease, color 1s ease;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .sky {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            transition: background 2s ease;
        }

        .celestial-body {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            transition: all 2s ease;
            z-index: -1;
        }

        .sun {
            background: radial-gradient(circle, #fff9c4 0%, #ffee58 40%, #ff9800 100%);
            box-shadow: 0 0 60px rgba(255, 183, 77, 0.8), 0 0 120px rgba(255, 183, 77, 0.4);
        }

        .moon {
            background: radial-gradient(circle at 30% 30%, #fafafa 0%, #e0e0e0 50%, #bdbdbd 100%);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), 0 0 80px rgba(200, 200, 255, 0.2);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .period-name {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
            line-height: 1.2;
            transition: color 1s ease;
        }

        .period-description {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-style: italic;
            font-weight: 300;
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.6;
            transition: color 1s ease;
        }

        .time-wheel {
            position: relative;
            width: clamp(280px, 70vw, 360px);
            height: clamp(280px, 70vw, 360px);
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .wheel-segment {
            fill: none;
            stroke-width: 28;
            opacity: 0.3;
            transition: opacity 0.5s ease, stroke-width 0.3s ease;
            cursor: pointer;
        }

        .wheel-segment:hover {
            opacity: 0.5;
        }

        .wheel-segment.active {
            opacity: 1;
            stroke-width: 34;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .center-icon {
            font-size: clamp(2rem, 6vw, 3rem);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .suggestion {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-style: italic;
            transition: all 0.3s ease;
        }

        .progress-arc {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 60px);
            height: calc(100% - 60px);
            border-radius: 50%;
            border: 2px solid;
            opacity: 0.3;
        }

        .date-display {
            font-size: clamp(0.8rem, 2vw, 1rem);
            opacity: 0.6;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>
    <div class="sky" id="sky"></div>
    <div class="stars" id="stars"></div>
    <div class="celestial-body sun" id="sun"></div>
    <div class="celestial-body moon" id="moon"></div>

    <div class="container">
        <div class="period-name" id="periodName">Loading...</div>
        <div class="period-description" id="periodDescription"></div>

        <div class="time-wheel">
            <svg class="wheel-svg" viewBox="0 0 200 200" id="wheel"></svg>
            <div class="wheel-center">
                <div class="center-icon" id="centerIcon"></div>
            </div>
        </div>

        <div class="suggestions" id="suggestions"></div>
        <div class="date-display" id="dateDisplay"></div>
    </div>

    <script>
        // Define circadian periods
        const periods = [
            { name: 'The Small Hours', start: 0, end: 4, icon: '🌑', color: '#1a237e',
              desc: 'The world sleeps. Dreams drift through the darkness.',
              suggestions: ['Deep sleep', 'Dreamtime', 'Rest'] },
            { name: 'First Light', start: 4, end: 5.5, icon: '🌅', color: '#4a148c',
              desc: 'The horizon whispers of the coming day.',
              suggestions: ['Early rising', 'Meditation', 'Quiet reflection'] },
            { name: 'Dawn', start: 5.5, end: 7, icon: '🌄', color: '#ff6f00',
              desc: 'The sun stretches above the earth. Birds announce the morning.',
              suggestions: ['Wake gently', 'Morning stretch', 'Watch sunrise'] },
            { name: 'Early Morning', start: 7, end: 8, icon: '☀️', color: '#ffab00',
              desc: 'Fresh beginnings. The day unfolds its possibilities.',
              suggestions: ['Breakfast', 'Morning walk', 'Plan your day'] },
            { name: 'Breakfast Time', start: 8, end: 9, icon: '🍳', color: '#ffd54f',
              desc: 'Nourish yourself for the journey ahead.',
              suggestions: ['Eat mindfully', 'Morning coffee', 'Read the news'] },
            { name: 'Mid-Morning', start: 9, end: 10.5, icon: '🌞', color: '#ffeb3b',
              desc: 'Energy rises. The mind is sharp and ready.',
              suggestions: ['Deep work', 'Important tasks', 'Creative thinking'] },
            { name: 'Elevenses', start: 10.5, end: 11, icon: '☕', color: '#fff176',
              desc: 'A brief pause. A warm cup and a moment of calm.',
              suggestions: ['Tea break', 'Light snack', 'Stretch'] },
            { name: 'Late Morning', start: 11, end: 12, icon: '⏳', color: '#fff59d',
              desc: 'The morning matures. Tasks approach completion.',
              suggestions: ['Finish morning work', 'Prepare for lunch', 'Check in'] },
            { name: 'High Noon', start: 12, end: 12.5, icon: '🌤️', color: '#fff9c4',
              desc: 'The sun reaches its zenith. A moment of pause.',
              suggestions: ['Midday break', 'Step outside', 'Breathe'] },
            { name: 'Lunch Time', start: 12.5, end: 14, icon: '🍽️', color: '#ffe082',
              desc: 'Replenish. Share a meal. Rest the working mind.',
              suggestions: ['Eat well', 'Take a walk', 'Good conversation'] },
            { name: 'Early Afternoon', start: 14, end: 15, icon: '🌻', color: '#ffca28',
              desc: 'The gentle lull after eating. Ease back into motion.',
              suggestions: ['Light tasks', 'Meetings', 'Collaboration'] },
            { name: 'Afternoon', start: 15, end: 16, icon: '📚', color: '#ffc107',
              desc: 'Steady progress. The day deepens.',
              suggestions: ['Focused work', 'Reading', 'Learning'] },
            { name: 'Tea Time', start: 16, end: 17, icon: '🫖', color: '#ffb300',
              desc: 'The civilized pause. Refresh before the evening.',
              suggestions: ['Afternoon tea', 'Sweet treat', 'Reflect on the day'] },
            { name: 'Late Afternoon', start: 17, end: 18, icon: '🌇', color: '#ff8f00',
              desc: 'Golden light stretches long. The day begins to soften.',
              suggestions: ['Wind down work', 'Evening plans', 'Transition'] },
            { name: 'Golden Hour', start: 18, end: 19, icon: '✨', color: '#ff6f00',
              desc: 'Everything glows amber. Magic light bathes the world.',
              suggestions: ['Be outside', 'Photography', 'Appreciate beauty'] },
            { name: 'Dusk', start: 19, end: 20, icon: '🌆', color: '#e65100',
              desc: 'Day and night embrace. Colors deepen into violet.',
              suggestions: ['Watch sunset', 'Evening walk', 'Gratitude'] },
            { name: 'Dinner Time', start: 20, end: 21, icon: '🍷', color: '#bf360c',
              desc: 'Gather around the table. Share stories and sustenance.',
              suggestions: ['Enjoy dinner', 'Family time', 'Good food'] },
            { name: 'Evening', start: 21, end: 22, icon: '🌙', color: '#4e342e',
              desc: 'The night settles in. Warmth and quiet companionship.',
              suggestions: ['Relax', 'Read', 'Quality time'] },
            { name: 'Night', start: 22, end: 23, icon: '🌃', color: '#3e2723',
              desc: 'Stars emerge. The world grows hushed.',
              suggestions: ['Wind down', 'Gentle activities', 'Prepare for rest'] },
            { name: 'Bedtime', start: 23, end: 24, icon: '😴', color: '#1a237e',
              desc: 'The body calls for rest. Let sleep come.',
              suggestions: ['Sleep ritual', 'Dim lights', 'Let go of the day'] }
        ];

        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Create wheel segments
        const wheel = document.getElementById('wheel');
        const radius = 86;
        const circumference = 2 * Math.PI * radius;

        periods.forEach((period, index) => {
            const startAngle = (period.start / 24) * 360;
            const endAngle = (period.end / 24) * 360;
            const arcLength = ((period.end - period.start) / 24) * circumference;
            const dashOffset = circumference - (period.start / 24) * circumference;

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '100');
            circle.setAttribute('cy', '100');
            circle.setAttribute('r', radius);
            circle.setAttribute('class', 'wheel-segment');
            circle.setAttribute('stroke', period.color);
            circle.setAttribute('stroke-dasharray', `${arcLength} ${circumference}`);
            circle.setAttribute('stroke-dashoffset', dashOffset);
            circle.dataset.index = index;
            wheel.appendChild(circle);
        });

        function getCurrentPeriod(hour) {
            const decimalHour = hour;
            for (let i = 0; i < periods.length; i++) {
                const period = periods[i];
                if (decimalHour >= period.start && decimalHour < period.end) {
                    return { period, index: i };
                }
            }
            return { period: periods[0], index: 0 };
        }

        function getSkyGradient(hour) {
            if (hour >= 0 && hour < 4) return 'linear-gradient(to bottom, #0d1b2a 0%, #1b263b 100%)';
            if (hour >= 4 && hour < 5.5) return 'linear-gradient(to bottom, #1b263b 0%, #415a77 50%, #778da9 100%)';
            if (hour >= 5.5 && hour < 7) return 'linear-gradient(to bottom, #ff7b00 0%, #ff9500 30%, #87ceeb 100%)';
            if (hour >= 7 && hour < 9) return 'linear-gradient(to bottom, #87ceeb 0%, #98d1f7 50%, #b8e0f9 100%)';
            if (hour >= 9 && hour < 16) return 'linear-gradient(to bottom, #56ccf2 0%, #87ceeb 50%, #b8e0f9 100%)';
            if (hour >= 16 && hour < 18) return 'linear-gradient(to bottom, #87ceeb 0%, #f6d365 50%, #fda085 100%)';
            if (hour >= 18 && hour < 19) return 'linear-gradient(to bottom, #fda085 0%, #f093fb 50%, #f5576c 100%)';
            if (hour >= 19 && hour < 20) return 'linear-gradient(to bottom, #c471ed 0%, #812990 50%, #1b263b 100%)';
            if (hour >= 20 && hour < 22) return 'linear-gradient(to bottom, #2c3e50 0%, #1b263b 50%, #0d1b2a 100%)';
            return 'linear-gradient(to bottom, #0d1b2a 0%, #1b263b 100%)';
        }

        function getTextColor(hour) {
            if (hour >= 7 && hour < 19) return '#2c3e50';
            return '#e8e4d9';
        }

        function updateCelestialBodies(hour) {
            const sun = document.getElementById('sun');
            const moon = document.getElementById('moon');
            const stars = document.getElementById('stars');

            // Sun arc: rises at 6, peaks at 12, sets at 18
            const sunProgress = (hour - 6) / 12; // 0 at 6am, 1 at 6pm
            const sunAngle = sunProgress * Math.PI;
            const sunX = 50 + 40 * Math.cos(Math.PI - sunAngle);
            const sunY = 80 - 60 * Math.sin(sunAngle);

            if (hour >= 5 && hour <= 20) {
                sun.style.opacity = hour >= 6 && hour <= 19 ? '1' : '0.5';
                sun.style.left = sunX + '%';
                sun.style.top = sunY + '%';
            } else {
                sun.style.opacity = '0';
            }

            // Moon arc: rises at 19, peaks at 0, sets at 7
            let moonHour = hour < 12 ? hour + 24 : hour;
            const moonProgress = (moonHour - 19) / 12;
            const moonAngle = moonProgress * Math.PI;
            const moonX = 50 + 40 * Math.cos(Math.PI - moonAngle);
            const moonY = 80 - 60 * Math.sin(moonAngle);

            if (hour >= 19 || hour <= 6) {
                moon.style.opacity = '1';
                moon.style.left = moonX + '%';
                moon.style.top = moonY + '%';
            } else {
                moon.style.opacity = '0';
            }

            // Stars visibility
            stars.style.opacity = (hour >= 20 || hour <= 5) ? '1' : '0';
        }

        function updateClock() {
            const now = new Date();
            const hour = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;

            const { period, index } = getCurrentPeriod(hour);

            // Update text
            document.getElementById('periodName').textContent = period.name;
            document.getElementById('periodDescription').textContent = period.desc;
            document.getElementById('centerIcon').textContent = period.icon;

            // Update suggestions
            const suggestionsEl = document.getElementById('suggestions');
            const bgColor = getTextColor(hour) === '#2c3e50'
                ? 'rgba(0,0,0,0.08)'
                : 'rgba(255,255,255,0.1)';
            suggestionsEl.innerHTML = period.suggestions.map(s =>
                `<span class="suggestion" style="background: ${bgColor}">${s}</span>`
            ).join('');

            // Update wheel
            document.querySelectorAll('.wheel-segment').forEach((seg, i) => {
                seg.classList.toggle('active', i === index);
            });

            // Update sky and colors
            document.getElementById('sky').style.background = getSkyGradient(hour);
            const textColor = getTextColor(hour);
            document.body.style.color = textColor;
            document.querySelector('.progress-arc')?.style.setProperty('border-color', textColor);

            // Update celestial bodies
            updateCelestialBodies(hour);

            // Date display
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('dateDisplay').textContent =
                `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
