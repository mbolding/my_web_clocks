<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circadian Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', Georgia, serif;
            transition: background 1s ease, color 1s ease;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .sky {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            transition: background 2s ease;
        }

        .celestial-body {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            transition: all 2s ease;
            z-index: -1;
        }

        .sun {
            background: radial-gradient(circle, #fff9c4 0%, #ffee58 40%, #ff9800 100%);
            box-shadow: 0 0 60px rgba(255, 183, 77, 0.8), 0 0 120px rgba(255, 183, 77, 0.4);
        }

        .moon {
            background: radial-gradient(circle at 30% 30%, #fafafa 0%, #e0e0e0 50%, #bdbdbd 100%);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3), 0 0 80px rgba(200, 200, 255, 0.2);
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .period-name {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 300;
            letter-spacing: 0.05em;
            line-height: 1.2;
            transition: color 1s ease;
        }

        .period-description {
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-style: italic;
            font-weight: 300;
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.6;
            transition: color 1s ease;
        }

        .time-wheel {
            position: relative;
            width: clamp(280px, 70vw, 360px);
            height: clamp(280px, 70vw, 360px);
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .wheel-segment {
            fill: none;
            stroke-width: 28;
            opacity: 0.3;
            transition: opacity 0.5s ease, stroke-width 0.3s ease;
            cursor: pointer;
        }

        .wheel-segment:hover {
            opacity: 0.5;
        }

        .wheel-segment.active {
            opacity: 1;
            stroke-width: 34;
        }

        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .center-icon {
            font-size: clamp(2rem, 6vw, 3rem);
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .suggestion {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            font-style: italic;
            transition: all 0.3s ease;
        }

        .progress-arc {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 60px);
            height: calc(100% - 60px);
            border-radius: 50%;
            border: 2px solid;
            opacity: 0.3;
        }

        .date-display {
            font-size: clamp(0.8rem, 2vw, 1rem);
            opacity: 0.6;
            letter-spacing: 0.1em;
        }

        .location-display {
            font-size: clamp(0.65rem, 1.5vw, 0.75rem);
            opacity: 0.4;
            letter-spacing: 0.05em;
            margin-top: 8px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="sky" id="sky"></div>
    <div class="stars" id="stars"></div>
    <div class="celestial-body sun" id="sun"></div>
    <div class="celestial-body moon" id="moon"></div>

    <div class="container">
        <div class="period-name" id="periodName">Loading...</div>
        <div class="period-description" id="periodDescription"></div>

        <div class="time-wheel">
            <svg class="wheel-svg" viewBox="0 0 200 200" id="wheel"></svg>
            <div class="wheel-center">
                <div class="center-icon" id="centerIcon"></div>
            </div>
        </div>

        <div class="suggestions" id="suggestions"></div>
        <div class="date-display" id="dateDisplay"></div>
        <div class="location-display" id="locationDisplay">Detecting location...</div>
    </div>

    <script>
        // Solar calculation functions
        let userLatitude = 40; // Default fallback
        let userLongitude = -74;
        let userLocation = 'Unknown Location';

        function calculateSunriseSunset(lat, lon, date) {
            try {
                const julianDate = date.getTime() / 86400000 + 2440587.5;
                const n = julianDate - 2451545.0 + 0.0008;
                const meanAnomaly = (357.5291 + 0.98560028 * n) % 360;
                const center = 1.9148 * Math.sin(meanAnomaly * Math.PI / 180) +
                              0.0200 * Math.sin(2 * meanAnomaly * Math.PI / 180) +
                              0.0003 * Math.sin(3 * meanAnomaly * Math.PI / 180);
                const eclipticLon = (meanAnomaly + center + 180 + 102.9372) % 360;

                const solarNoon = n - lon / 360;
                const declination = Math.asin(Math.sin(eclipticLon * Math.PI / 180) *
                                   Math.sin(23.44 * Math.PI / 180)) * 180 / Math.PI;

                const hourAngle = Math.acos((Math.sin(-0.83 * Math.PI / 180) -
                                 Math.sin(lat * Math.PI / 180) * Math.sin(declination * Math.PI / 180)) /
                                 (Math.cos(lat * Math.PI / 180) * Math.cos(declination * Math.PI / 180))) * 180 / Math.PI;

                let sunrise = (solarNoon - hourAngle / 360) * 24;
                let sunset = (solarNoon + hourAngle / 360) * 24;

                // Ensure values are within valid range
                if (isNaN(sunrise) || sunrise < 0) sunrise = 6;
                if (isNaN(sunset) || sunset > 24) sunset = 18;
                if (sunrise >= sunset) {
                    sunrise = 6;
                    sunset = 18;
                }

                return { sunrise, sunset };
            } catch (error) {
                console.error('Error calculating sunrise/sunset:', error);
                // Fallback to reasonable defaults
                return { sunrise: 6, sunset: 18 };
            }
        }

        function getDynamicPeriods() {
            try {
                const now = new Date();
                const { sunrise, sunset } = calculateSunriseSunset(userLatitude, userLongitude, now);

                const solarNoon = (sunrise + sunset) / 2;

                // Periods aligned with user's schedule
                const periods = [
                    { name: 'Deep Sleep', start: 0, end: 6, icon: '🌑', color: '#1a237e',
                      desc: 'The world sleeps. Dreams drift through the darkness.',
                      suggestions: ['Deep sleep', 'Rest', 'Dreamtime'] },
                    { name: 'Wake Up', start: 6, end: 6.5, icon: '🌅', color: '#4a148c',
                      desc: 'A new day begins. Time to rise.',
                      suggestions: ['Wake gently', 'Morning stretch', 'Hydrate'] },
                    { name: 'Morning Coffee', start: 6.5, end: 7.5, icon: '☕', color: '#ff6f00',
                      desc: 'First coffee of the day. Energy awakens.',
                      suggestions: ['Coffee', 'Breakfast', 'Morning routine'] },
                    { name: 'Commute', start: 7.5, end: 8, icon: '🚗', color: '#ffab00',
                      desc: 'Journey to work begins.',
                      suggestions: ['Podcast', 'Music', 'Plan your day'] },
                    { name: 'Work Morning', start: 8, end: 12, icon: '💼', color: '#ffd54f',
                      desc: 'Focus and productivity. Deep work hours.',
                      suggestions: ['Important tasks', 'Meetings', 'Creative work'] },
                    { name: 'Lunch Break', start: 12, end: 13, icon: '🍽️', color: '#fff9c4',
                      desc: 'Midday pause. Nourish and recharge.',
                      suggestions: ['Eat well', 'Walk outside', 'Rest mind'] },
                    { name: 'Work Afternoon', start: 13, end: 17, icon: '📊', color: '#ffe082',
                      desc: 'Steady progress through the afternoon.',
                      suggestions: ['Collaboration', 'Focused work', 'Wrap up tasks'] },
                    { name: 'End of Work', start: 17, end: 17.5, icon: '🎯', color: '#ffc107',
                      desc: 'Workday complete. Transition to evening.',
                      suggestions: ['Finish up', 'Plan tomorrow', 'Decompress'] },
                    { name: 'Evening Commute', start: 17.5, end: 18, icon: '🏠', color: '#ffb300',
                      desc: 'Journey home. The day winds down.',
                      suggestions: ['Music', 'Audiobook', 'Unwind'] },
                    { name: 'Golden Hour', start: Math.max(18, sunset - 1), end: Math.min(19, sunset + 0.5), icon: '✨', color: '#ff8f00',
                      desc: 'Evening light. Time to relax before dinner.',
                      suggestions: ['Be outside', 'Walk', 'Appreciate beauty'] },
                    { name: 'Dinner Time', start: 19, end: 20, icon: '🍷', color: '#ff6f00',
                      desc: 'Evening meal. Gather and share.',
                      suggestions: ['Good food', 'Conversation', 'Family time'] },
                    { name: 'Evening', start: 20, end: 21, icon: '🌙', color: '#e65100',
                      desc: 'The night settles in. Time to unwind.',
                      suggestions: ['Relax', 'Read', 'TV', 'Hobbies'] },
                    { name: 'Bedtime', start: 21, end: 23, icon: '😴', color: '#4e342e',
                      desc: 'Time for rest. Wind down and prepare for sleep.',
                      suggestions: ['Sleep ritual', 'Dim lights', 'Prepare for bed'] },
                    { name: 'Sleep', start: 23, end: 24, icon: '🌑', color: '#1a237e',
                      desc: 'Falling asleep. The world grows quiet.',
                      suggestions: ['Deep rest', 'Dream', 'Sleep'] }
                ];

                // Filter out invalid periods (where start >= end)
                const validPeriods = periods.filter(p => p.start < p.end);

                if (validPeriods.length === 0) {
                    throw new Error('No valid periods generated');
                }

                return validPeriods;
            } catch (error) {
                console.error('Error in getDynamicPeriods:', error);
                // Fallback to simple fixed periods
                return [
                    { name: 'Night', start: 0, end: 6, icon: '🌑', color: '#1a237e',
                      desc: 'The world sleeps.', suggestions: ['Rest'] },
                    { name: 'Morning', start: 6, end: 12, icon: '☀️', color: '#ffab00',
                      desc: 'A new day begins.', suggestions: ['Wake up'] },
                    { name: 'Afternoon', start: 12, end: 18, icon: '🌤️', color: '#fff9c4',
                      desc: 'The day continues.', suggestions: ['Work'] },
                    { name: 'Evening', start: 18, end: 24, icon: '🌙', color: '#4e342e',
                      desc: 'The day winds down.', suggestions: ['Relax'] }
                ];
            }
        }

        // Get user location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLatitude = position.coords.latitude;
                        userLongitude = position.coords.longitude;

                        // Reverse geocode to get location name
                        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLatitude}&lon=${userLongitude}&format=json`)
                            .then(response => response.json())
                            .then(data => {
                                const city = data.address.city || data.address.town || data.address.village || '';
                                const state = data.address.state || '';
                                const country = data.address.country || '';
                                userLocation = [city, state, country].filter(x => x).join(', ');
                                document.getElementById('locationDisplay').textContent = userLocation;
                                recreateWheel();
                            })
                            .catch(() => {
                                userLocation = `${userLatitude.toFixed(2)}°, ${userLongitude.toFixed(2)}°`;
                                document.getElementById('locationDisplay').textContent = userLocation;
                                recreateWheel();
                            });
                    },
                    (error) => {
                        document.getElementById('locationDisplay').textContent = 'Location unavailable (using default)';
                        recreateWheel();
                    }
                );
            } else {
                document.getElementById('locationDisplay').textContent = 'Geolocation not supported';
                recreateWheel();
            }
        }

        function recreateWheel() {
            try {
                const wheel = document.getElementById('wheel');
                wheel.innerHTML = '';
                const periods = getDynamicPeriods();
                const radius = 86;
                const circumference = 2 * Math.PI * radius;

                periods.forEach((period, index) => {
                    const startAngle = (period.start / 24) * 360;
                    const endAngle = (period.end / 24) * 360;
                    const arcLength = ((period.end - period.start) / 24) * circumference;
                    const dashOffset = circumference - (period.start / 24) * circumference;

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', '100');
                    circle.setAttribute('cy', '100');
                    circle.setAttribute('r', radius);
                    circle.setAttribute('class', 'wheel-segment');
                    circle.setAttribute('stroke', period.color);
                    circle.setAttribute('stroke-dasharray', `${arcLength} ${circumference}`);
                    circle.setAttribute('stroke-dashoffset', dashOffset);
                    circle.dataset.index = index;
                    wheel.appendChild(circle);
                });
            } catch (error) {
                console.error('Error in recreateWheel:', error);
            }
        }


        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = (Math.random() * 2 + 1) + 'px';
            star.style.height = star.style.width;
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        function getCurrentPeriod(hour) {
            try {
                const periods = getDynamicPeriods();
                const decimalHour = hour;

                // Find the period that contains this hour
                for (let i = 0; i < periods.length; i++) {
                    const period = periods[i];
                    if (decimalHour >= period.start && decimalHour < period.end) {
                        return { period, index: i };
                    }
                }

                // Handle edge case for hour 24 (midnight)
                if (decimalHour >= 23.999) {
                    return { period: periods[periods.length - 1], index: periods.length - 1 };
                }

                // If no exact match, find the closest period (handles edge cases)
                let closestIndex = 0;
                let closestDistance = Math.abs(decimalHour - periods[0].start);

                for (let i = 1; i < periods.length; i++) {
                    const distance = Math.min(
                        Math.abs(decimalHour - periods[i].start),
                        Math.abs(decimalHour - periods[i].end)
                    );
                    if (distance < closestDistance) {
                        closestDistance = distance;
                        closestIndex = i;
                    }
                }

                return { period: periods[closestIndex], index: closestIndex };
            } catch (error) {
                console.error('Error in getCurrentPeriod:', error);
                // Emergency fallback
                return {
                    period: { name: 'Day', start: 0, end: 24, icon: '🌍', color: '#87ceeb',
                              desc: 'Time flows onward.', suggestions: ['Live'] },
                    index: 0
                };
            }
        }

        function getSkyGradient(hour) {
            const now = new Date();
            const { sunrise, sunset } = calculateSunriseSunset(userLatitude, userLongitude, now);

            if (hour < sunrise - 2) return 'linear-gradient(to bottom, #0d1b2a 0%, #1b263b 100%)';
            if (hour >= sunrise - 2 && hour < sunrise - 0.5) return 'linear-gradient(to bottom, #1b263b 0%, #415a77 50%, #778da9 100%)';
            if (hour >= sunrise - 0.5 && hour < sunrise + 0.5) return 'linear-gradient(to bottom, #ff7b00 0%, #ff9500 30%, #87ceeb 100%)';
            if (hour >= sunrise + 0.5 && hour < sunrise + 2) return 'linear-gradient(to bottom, #87ceeb 0%, #98d1f7 50%, #b8e0f9 100%)';
            if (hour >= sunrise + 2 && hour < sunset - 2) return 'linear-gradient(to bottom, #56ccf2 0%, #87ceeb 50%, #b8e0f9 100%)';
            if (hour >= sunset - 2 && hour < sunset - 0.5) return 'linear-gradient(to bottom, #87ceeb 0%, #f6d365 50%, #fda085 100%)';
            if (hour >= sunset - 0.5 && hour < sunset + 0.5) return 'linear-gradient(to bottom, #fda085 0%, #f093fb 50%, #f5576c 100%)';
            if (hour >= sunset + 0.5 && hour < sunset + 1.5) return 'linear-gradient(to bottom, #c471ed 0%, #812990 50%, #1b263b 100%)';
            if (hour >= sunset + 1.5 && hour < 23) return 'linear-gradient(to bottom, #2c3e50 0%, #1b263b 50%, #0d1b2a 100%)';
            return 'linear-gradient(to bottom, #0d1b2a 0%, #1b263b 100%)';
        }

        function getTextColor(hour) {
            const now = new Date();
            const { sunrise, sunset } = calculateSunriseSunset(userLatitude, userLongitude, now);
            if (hour >= sunrise + 0.5 && hour < sunset + 0.5) return '#2c3e50';
            return '#e8e4d9';
        }

        function updateCelestialBodies(hour) {
            const sun = document.getElementById('sun');
            const moon = document.getElementById('moon');
            const stars = document.getElementById('stars');

            const now = new Date();
            const { sunrise, sunset } = calculateSunriseSunset(userLatitude, userLongitude, now);
            const dayLength = sunset - sunrise;

            // Sun arc: rises at sunrise, peaks at solar noon, sets at sunset
            const solarNoon = (sunrise + sunset) / 2;
            const sunProgress = (hour - sunrise) / dayLength;
            const sunAngle = sunProgress * Math.PI;
            const sunX = 50 + 40 * Math.cos(Math.PI - sunAngle);
            const sunY = 80 - 60 * Math.sin(sunAngle);

            if (hour >= sunrise - 1 && hour <= sunset + 1) {
                sun.style.opacity = hour >= sunrise && hour <= sunset ? '1' : '0.5';
                sun.style.left = sunX + '%';
                sun.style.top = sunY + '%';
            } else {
                sun.style.opacity = '0';
            }

            // Moon arc: opposite of sun
            const nightStart = sunset + 1;
            const nightEnd = sunrise - 1;
            const nightMiddle = nightStart + 12; // Approximate midnight

            let moonHour = hour;
            if (hour < sunrise) moonHour = hour + 24;

            const moonProgress = (moonHour - nightStart) / 12;
            const moonAngle = moonProgress * Math.PI;
            const moonX = 50 + 40 * Math.cos(Math.PI - moonAngle);
            const moonY = 80 - 60 * Math.sin(moonAngle);

            if (hour >= sunset || hour <= sunrise) {
                moon.style.opacity = '1';
                moon.style.left = moonX + '%';
                moon.style.top = moonY + '%';
            } else {
                moon.style.opacity = '0';
            }

            // Stars visibility
            stars.style.opacity = (hour >= sunset + 1 || hour <= sunrise - 1) ? '1' : '0';
        }

        function updateClock() {
            try {
                const now = new Date();
                const hour = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;

                const { period, index } = getCurrentPeriod(hour);

                if (!period) {
                    console.error('No period found for hour:', hour);
                    return;
                }

                // Update text
                document.getElementById('periodName').textContent = period.name;
                document.getElementById('periodDescription').textContent = period.desc;
                document.getElementById('centerIcon').textContent = period.icon;

            // Update suggestions
            const suggestionsEl = document.getElementById('suggestions');
            const bgColor = getTextColor(hour) === '#2c3e50'
                ? 'rgba(0,0,0,0.08)'
                : 'rgba(255,255,255,0.1)';
            suggestionsEl.innerHTML = period.suggestions.map(s =>
                `<span class="suggestion" style="background: ${bgColor}">${s}</span>`
            ).join('');

            // Update wheel
            document.querySelectorAll('.wheel-segment').forEach((seg, i) => {
                seg.classList.toggle('active', i === index);
            });

            // Update sky and colors
            document.getElementById('sky').style.background = getSkyGradient(hour);
            const textColor = getTextColor(hour);
            document.body.style.color = textColor;
            document.querySelector('.progress-arc')?.style.setProperty('border-color', textColor);

            // Update celestial bodies
            updateCelestialBodies(hour);

                // Date display
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                const months = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];
                document.getElementById('dateDisplay').textContent =
                    `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
            } catch (error) {
                console.error('Error in updateClock:', error);
                document.getElementById('periodName').textContent = 'Error loading';
            }
        }

        // Initialize
        recreateWheel(); // Create initial wheel with default location
        getLocation(); // Then update with actual location
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
