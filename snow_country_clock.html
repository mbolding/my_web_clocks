<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snow Country Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,300;0,400;1,300&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-night: #0b111a;
            --snow: #e6f2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-night);
            color: var(--snow);
            font-family: 'Cormorant Infant', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient gradient mimicking a cold midnight window */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05) 0%, transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        /* The Snow Canvas */
        #snowCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
        }

        /* Clock Display */
        .clock-container {
            position: relative;
            z-index: 10;
            text-align: center;
            /* Frost effect */
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(4px);
            padding: 40px 80px;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .time-display {
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 300;
            letter-spacing: 15px;
            margin-right: -15px; /* Offset the tracking */
            opacity: 0.85;
            filter: drop-shadow(0 0 10px rgba(230,242,255,0.2));
            transition: opacity 2s ease;
        }

        .ampm {
            font-size: 1.5rem;
            letter-spacing: 5px;
            opacity: 0.5;
            vertical-align: top;
            margin-left: 10px;
        }

        .quote-box {
            position: absolute;
            bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            opacity: 0.6;
            transition: opacity 3s ease;
        }

        .quote-en {
            font-size: 1.1rem;
            font-style: italic;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .quote-jp {
            font-family: 'Noto Serif JP', serif;
            font-size: 0.85rem;
            letter-spacing: 8px;
            font-weight: 200;
        }

    </style>
</head>
<body>

    <canvas id="snowCanvas"></canvas>

    <div class="clock-container">
        <div class="time-display" id="timeDisplay">
            <span id="t-h">00</span>:<span id="t-m">00</span><span class="ampm" id="t-ap"></span>
        </div>
    </div>

    <div class="quote-box">
        <div class="quote-en">"The train came out of the long tunnel into the snow country."</div>
        <div class="quote-jp">国境の長いトンネルを抜けると雪国であった。</div>
    </div>

    <script>
        // --- Clock Logic ---
        const tH = document.getElementById('t-h');
        const tM = document.getElementById('t-m');
        const tAP = document.getElementById('t-ap');

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes().toString().padStart(2, '0');
            
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12;
            h = h ? h : 12; // formatting 0 to 12
            let hStr = h.toString().padStart(2, '0');

            tH.textContent = hStr;
            tM.textContent = m;
            tAP.textContent = ampm;

            requestAnimationFrame(updateClock);
        }
        updateClock();

        // --- Canvas Snow Particle System ---
        const canvas = document.getElementById('snowCanvas');
        const ctx = canvas.getContext('2d');
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;

        const snowflakes = [];
        const numFlakes = 250;

        class Flake {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5; // very delicate
                this.speedY = Math.random() * 0.5 + 0.1; // slow, gentle fall
                this.speedX = (Math.random() - 0.5) * 0.3; // slight drift
                this.opacity = Math.random() * 0.5 + 0.1;
                // Add a subtle wobble
                this.wobbleSpeed = Math.random() * 0.02;
                this.wobbleAngle = Math.random() * Math.PI * 2;
            }

            update() {
                this.wobbleAngle += this.wobbleSpeed;
                this.x += this.speedX + Math.sin(this.wobbleAngle) * 0.2;
                this.y += this.speedY;

                // Wrap around edges
                if (this.y > height) {
                    this.y = -5;
                    this.x = Math.random() * width;
                }
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
            }

            draw() {
                ctx.fillStyle = `rgba(230, 242, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < numFlakes; i++) {
            snowflakes.push(new Flake());
        }

        function animateSnow() {
            ctx.clearRect(0, 0, width, height);
            
            for (let flake of snowflakes) {
                flake.update();
                flake.draw();
            }
            
            requestAnimationFrame(animateSnow);
        }
        animateSnow();

        // Handle resize
        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        });
    </script>
</body>
</html>
